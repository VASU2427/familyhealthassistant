    function RemindersTab() {
      const {
        activeMember,
        activeMemberId,
        medicines,
        logMedicineDose,
        orderMedicines,
        vaccinations,
        updateVaccinationStatus,
        geminiKey,
        addMedicine,
        uploadedRecords,
        setUploadedRecords,
        addToast
      } = useContext(HealthContext);

      if (activeMemberId === 'household') {
        return <ProfileSelectionPrompt title="Medication & Vaccination Reminders" />;
      }

      const [subTab, setSubTab] = useState('medicines');
      const [basket, setBasket] = useState([]);
      const [selectedMed, setSelectedMed] = useState(null);
      const [aiQuestion, setAiQuestion] = useState('');
      const [aiResponse, setAiResponse] = useState('');
      const [loadingAi, setLoadingAi] = useState(false);
      const [fdaData, setFdaData] = useState(null);
      const [loadingFda, setLoadingFda] = useState(false);

      // Reminders scanning & manual add states
      const [showAddReminderModal, setShowAddReminderModal] = useState(false);
      const [manualMedForm, setManualMedForm] = useState({ name: '', dosage: '1 Tablet', time: 'Morning', total: 30 });

      // Camera & Scan states
      const [cameraActive, setCameraActive] = useState(false);
      const [scanning, setScanning] = useState(false);
      const [scanStep, setScanStep] = useState('');
      const [selectedFile, setSelectedFile] = useState(null);
      const [fileBase64, setFileBase64] = useState('');
      const [stream, setStream] = useState(null);
      
      // Cropper states
      const [cropping, setCropping] = useState(false);
      const [corners, setCorners] = useState({
        tl: { x: 15, y: 15 },
        tr: { x: 85, y: 15 },
        br: { x: 85, y: 85 },
        bl: { x: 15, y: 85 }
      });
      const [draggingHandle, setDraggingHandle] = useState(null);

      // Consent & Auth
      const [showConsentModal, setShowConsentModal] = useState(false);
      const [showAuthModal, setShowAuthModal] = useState(false);
      const [pin, setPin] = useState('');
      const [authError, setAuthError] = useState('');

      // Extracted Prescription Meds
      const [extractedMeds, setExtractedMeds] = useState([]);
      const [isScanFinished, setIsScanFinished] = useState(false);

      const videoRef = useRef(null);
      const containerRef = useRef(null);

      useEffect(() => {
        return () => {
          if (stream) {
            stream.getTracks().forEach(track => track.stop());
          }
        };
      }, [stream]);

      const startPrescriptionScan = async () => {
        setSelectedFile(null);
        setFileBase64('');
        setExtractedMeds([]);
        setIsScanFinished(false);
        setCameraActive(true);
        try {
          const s = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
          });
          setStream(s);
          if (videoRef.current) {
            videoRef.current.srcObject = s;
            videoRef.current.play().catch(err => console.error("Video play failed:", err));
          }
        } catch (err) {
          console.error("Camera access failed:", err);
          alert("Could not start live video stream. Upload a prescription instead.");
          setCameraActive(false);
        }
      };

      const stopCamera = () => {
        if (stream) {
          stream.getTracks().forEach(track => track.stop());
          setStream(null);
        }
        setCameraActive(false);
      };

      const capturePhoto = () => {
        if (!videoRef.current) return;
        const video = videoRef.current;
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        const dataUrl = canvas.toDataURL('image/jpeg');
        setFileBase64(dataUrl);
        setSelectedFile({
          name: 'Prescription_' + new Date().toISOString().split('T')[0] + '_' + Math.floor(Math.random() * 1000) + '.jpg',
          type: 'image/jpeg',
          size: Math.round((dataUrl.length * 3) / 4)
        });
        stopCamera();
        setCropping(true);
      };

      const handlePointerDown = (handle, e) => {
        e.preventDefault();
        setDraggingHandle(handle);
      };

      const handlePointerMove = (e) => {
        if (!draggingHandle || !containerRef.current) return;
        const rect = containerRef.current.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;

        let x = ((clientX - rect.left) / rect.width) * 100;
        let y = ((clientY - rect.top) / rect.height) * 100;

        x = Math.max(0, Math.min(100, x));
        y = Math.max(0, Math.min(100, y));

        setCorners(prev => ({
          ...prev,
          [draggingHandle]: { x: Math.round(x), y: Math.round(y) }
        }));
      };

      const handlePointerUp = () => {
        setDraggingHandle(null);
      };

      const triggerScan = async () => {
        setScanning(true);
        setScanStep("Reading report metadata...");
        await new Promise(r => setTimeout(r, 600));
        setScanStep("Running OCR & structuring prescription medications...");
        await new Promise(r => setTimeout(r, 800));

        if (geminiKey && fileBase64) {
          setScanStep("Consulting Gemini AI to extract Rx medications...");
          try {
            const extracted = await runOCR(geminiKey, fileBase64, 'English');
            const meds = Array.isArray(extracted.medications) 
              ? extracted.medications.filter(m => m && m.name)
              : [];
            
            if (meds.length === 0) {
              addToast("No medications detected in prescription image. Try mock template.", "warning");
              runMockScan();
            } else {
              setExtractedMeds(meds);
              setIsScanFinished(true);
            }
          } catch (err) {
            console.error(err);
            addToast(`OCR Extraction failed: ${err.message}. Using fallback.`, 'danger');
            runMockScan();
          } finally {
            setScanning(false);
          }
        } else {
          runMockScan();
          setScanning(false);
        }
      };

      const runMockScan = () => {
        const meds = [
          { name: "Amoxicillin", dosage: "500mg", frequency: "Morning & Night" },
          { name: "Paracetamol", dosage: "650mg", frequency: "Afternoon (if fever)" },
          { name: "Cetirizine", dosage: "10mg", frequency: "Night" }
        ];
        setExtractedMeds(meds);
        setIsScanFinished(true);
      };

      const handleSaveConfirm = () => {
        const recordName = selectedFile ? selectedFile.name : 'Prescription_OCR_' + new Date().toISOString().split('T')[0] + '.jpg';
        let savedBase64 = fileBase64;
        if (fileBase64 && fileBase64.length > 350000) {
          savedBase64 = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23090d16'/><text x='10' y='50' fill='%2364748b' font-size='8'>[Archived Prescription Content]</text></svg>";
        }

        setUploadedRecords(prev => [
          {
            id: 'prescription_' + Date.now(),
            memberId: activeMember.id,
            name: recordName,
            date: new Date().toISOString().split('T')[0],
            doctor: 'AI Auto-Scanner',
            type: 'Prescription',
            fileData: savedBase64,
            notes: 'Extracted medications from prescription scanner.',
            diagnosis: ["Prescription Routine Update"],
            advice: ["Take medications as scheduled"],
            medications: extractedMeds.map(m => ({ name: m.name, dosage: m.dosage, frequency: m.frequency, route: 'Orally', duration: '30 days' })),
            tests: []
          },
          ...prev
        ]);

        addToast("Prescription saved securely to Repository!", "success");
        setShowAuthModal(false);
        setPin('');
        setAuthError('');
      };

      const handleAddManual = (e) => {
        e.preventDefault();
        if (!manualMedForm.name.trim()) return;
        addMedicine(activeMember.id, {
          name: manualMedForm.name,
          dosage: manualMedForm.dosage,
          time: manualMedForm.time,
          total: manualMedForm.total
        });
        setShowAddReminderModal(false);
        setManualMedForm({ name: '', dosage: '1 Tablet', time: 'Morning', total: 30 });
      };

      const handleToggle = (m) => {
        if (basket.find(x => x.id === m.id)) setBasket(basket.filter(x => x.id !== m.id));
        else setBasket([...basket, m]);
      };

      const handleOrder = () => {
        if (basket.length === 0) return;
        const list = basket.map(b => b.name).join(', ');
        orderMedicines(list, basket.length * 350);
        setBasket([]);
      };

      useEffect(() => {
        if (!selectedMed) {
          setFdaData(null);
          return;
        }

        const fetchFDA = async () => {
          setLoadingFda(true);
          setFdaData(null);
          try {
            const cleanName = encodeURIComponent(selectedMed.name.trim().split(' ')[0]);
            const url = `https://api.fda.gov/drug/label.json?search=(openfda.brand_name:"${cleanName}"+openfda.generic_name:"${cleanName}")&limit=1`;
            const res = await fetch(url);
            if (res.ok) {
              const data = await res.json();
              if (data.results && data.results.length > 0) {
                setFdaData(data.results[0]);
                return;
              }
            }
          } catch (e) {
            console.error("Error fetching openFDA data:", e);
          } finally {
            setLoadingFda(false);
          }
        };

        fetchFDA();
      }, [selectedMed]);

      const handleAskAI = async () => {
        if (!aiQuestion.trim()) return;
        setLoadingAi(true);
        setAiResponse('');

        if (geminiKey) {
          try {
            const prompt = `You are a medically authenticated pharmacy assistant.
You are asked about the medicine: "${selectedMed.name}" (${selectedMed.dosage || 'Standard dosage'}).
Question: "${aiQuestion}".
Provide accurate, medically sound, and authenticated information. Focus strictly on answering the question.`;

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${geminiKey}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }],
                tools: [{ googleSearch: {} }]
              })
            });

            if (!response.ok) {
              const errJson = await response.json().catch(() => ({}));
              throw new Error(errJson.error?.message || `HTTP error ${response.status}`);
            }
            const resJson = await response.json();
            const textResponse = resJson.candidates?.[0]?.content?.parts?.[0]?.text || '';
            setAiResponse(textResponse.trim());
          } catch (err) {
            setAiResponse(`⚠️ Error: ${err.message}`);
          } finally {
            setLoadingAi(false);
          }
        } else {
          setTimeout(() => {
            const q = aiQuestion.toLowerCase();
            const name = selectedMed.name.toLowerCase();
            let reply = "No info";

            if (q.includes('alternate') || q.includes('alternative') || q.includes('substitute') || q.includes('generic')) {
              if (name.includes('metformin')) {
                reply = "Generic Metformin alternatives include brand names like Glucophage, Fortamet, or active alternatives like Glipizide (sulfonylurea class) or Jardiance (SGLT2 inhibitor).";
              } else if (name.includes('atorvastatin')) {
                reply = "Rosuvastatin (Crestor) or Simvastatin (Zocor) are common alternate statins. Consult your cardiologist before switching.";
              }
            } else if (q.includes('side effect') || q.includes('warning') || q.includes('danger')) {
              if (name.includes('metformin')) {
                reply = "Common side effects include bloating, nausea, and mild diarrhea. Warn physician of kidney health; lactic acidosis is a rare but critical risk.";
              } else if (name.includes('atorvastatin')) {
                reply = "Can cause muscle aches (myalgia), mild headache, or elevation in liver enzymes. Rhabdomyolysis is a rare, severe complication.";
              }
            }
            setAiResponse(reply);
            setLoadingAi(false);
          }, 600);
        }
      };

      return (
        <div className="fade-in" style={{ display: 'flex', flexDirection: 'column', gap: '1rem', position: 'relative' }}>

          <div style={{ display: 'flex', background: 'var(--bg-primary)', borderRadius: '12px', padding: '0.25rem', border: '1px solid var(--border-color)' }}>
            <button onClick={() => setSubTab('medicines')} style={{ flex: 1, padding: '0.45rem', fontSize: '0.75rem', fontWeight: 'bold', border: 'none', background: subTab === 'medicines' ? 'var(--color-primary)' : 'none', color: subTab === 'medicines' ? '#fff' : 'var(--text-secondary)', borderRadius: '8px', cursor: 'pointer' }}>Medicines</button>
            <button onClick={() => setSubTab('vaccinations')} style={{ flex: 1, padding: '0.45rem', fontSize: '0.75rem', fontWeight: 'bold', border: 'none', background: subTab === 'vaccinations' ? 'var(--color-primary)' : 'none', color: subTab === 'vaccinations' ? '#fff' : 'var(--text-secondary)', borderRadius: '8px', cursor: 'pointer' }}>Vaccinations</button>
          </div>

          {subTab === 'medicines' ? (
            <div style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>

                <div className="glass-panel" style={{ padding: '1rem', border: '2px solid var(--color-success)', background: 'rgba(22, 163, 74, 0.02)' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.75rem' }}>
                    <h4 style={{ fontSize: '0.85rem', color: 'var(--color-success)', fontWeight: 'bold', margin: 0 }}>📋 Extracted Scan Medications</h4>
                    <button className="btn-icon" onClick={() => { setExtractedMeds([]); setIsScanFinished(false); }} style={{ background: 'none', border: 'none', color: 'var(--text-secondary)', cursor: 'pointer' }}><Icon name="x" size={16} /></button>
                  </div>
                  <p style={{ fontSize: '0.65rem', color: 'var(--text-secondary)', marginBottom: '0.75rem', textAlign: 'left' }}>Link these parsed medicines directly to medication schedule:</p>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: '0.5rem' }}>
                    {extractedMeds.map((med, idx) => (
                      <div key={idx} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '0.5rem', background: 'var(--bg-primary)', borderRadius: '8px', border: '1px solid var(--border-color)', gap: '0.5rem' }}>
                        <div style={{ textAlign: 'left', flex: 1 }}>
                          <strong style={{ fontSize: '0.75rem' }}>
                            <input 
                              type="text" 
                              value={med.name} 
                              onChange={(e) => {
                                const val = e.target.value;
                                setExtractedMeds(prev => prev.map((item, i) => i === idx ? { ...item, name: val } : item));
                              }}
                              style={{ background: 'transparent', border: 'none', borderBottom: '1px dashed var(--border-color)', color: 'inherit', fontSize: '0.75rem', fontWeight: 'bold', width: '100%', padding: '2px 0' }}
                            />
                          </strong>
                          <div style={{ fontSize: '0.6rem', color: 'var(--text-secondary)', display: 'flex', gap: '0.5rem', marginTop: '0.25rem' }}>
                            <span>
                              Dose: 
                              <input 
                                type="text" 
                                value={med.dosage || ''} 
                                onChange={(e) => {
                                  const val = e.target.value;
                                  setExtractedMeds(prev => prev.map((item, i) => i === idx ? { ...item, dosage: val } : item));
                                }}
                                style={{ background: 'transparent', border: 'none', borderBottom: '1px dashed var(--border-color)', color: 'inherit', fontSize: '0.6rem', width: '50px', marginLeft: '2px' }}
                              />
                            </span>
                            <span>
                              Freq: 
                              <input 
                                type="text"

                                onChange={(e) => {
                                  const val = e.target.value;
                                  setExtractedMeds(prev => prev.map((item, i) => i === idx ? { ...item, frequency: val } : item));
                                }}
                                style={{ background: 'transparent', border: 'none', borderBottom: '1px dashed var(--border-color)', color: 'inherit', fontSize: '0.6rem', width: '90px', marginLeft: '2px' }}
                              />
                            </span>
                          </div>
                        </div>
                        <button 
                          className="btn btn-primary" 
                          onClick={() => {
                            addMedicine(activeMember.id, {

                              dosage: med.dosage || '1 Tablet',

                          + Add to Reminders
                        </button>
                      </div>
                    ))}
                  </div>
                  <button className="btn btn-primary" onClick={() => { setShowConsentModal(true); }} style={{ width: '100%', marginTop: '0.8rem', fontSize: '0.72rem', padding: '0.4rem' }}>
                    💾 Save Prescription to Repository
                  </button>
                </div>
              )}

              <div className="glass-panel" style={{ padding: '1rem' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.75rem' }}>

                    <button className="btn btn-secondary" onClick={() => setShowAddReminderModal(true)} style={{ fontSize: '0.7rem', padding: '0.3rem 0.6rem', display: 'flex', alignItems: 'center', gap: '0.2rem', margin: 0 }}>
                      <Icon name="plus" size={12} /> Add
                    </button>
                    <button className="btn btn-secondary" onClick={startPrescriptionScan} style={{ fontSize: '0.7rem', padding: '0.3rem 0.6rem', display: 'flex', alignItems: 'center', gap: '0.2rem', background: '#fee2e2', color: 'var(--color-danger)', border: '1px solid rgba(220, 38, 38, 0.2)', margin: 0 }} title="Scan Prescription">
                      <Icon name="camera" size={12} color="var(--color-danger)" /> Scan
                    </button>
                  </div>
                </div>

                {/* Live Camera View in Reminders */}
                {cameraActive && (
                  <div style={{ position: 'relative', width: '100%', height: '180px', background: '#020617', borderRadius: '12px', overflow: 'hidden', border: '1px solid var(--border-color)', marginBottom: '0.75rem' }}>
                    <video ref={videoRef} style={{ width: '100%', height: '100%', objectFit: 'cover' }} playsInline muted />
                    <div className="scan-guide-overlay">
                      <div className="scan-laser-line" />

                {scanning && (

                      <p style={{ fontSize: '0.65rem', color: 'var(--text-secondary)', fontStyle: 'italic', margin: 0 }}>{scanStep}</p>
                    </div>
                  </div>

                {medicines && medicines.length > 0 ? (
                  <div style={{ display: 'flex', flexDirection: 'column', gap: '0.5rem', marginTop: '0.5rem' }}>

                      <div key={m.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '0.5rem', border: '1px solid var(--border-color)', borderRadius: '8px' }}>
                        <div style={{ flex: 1, textAlign: 'left' }}>
                          <div style={{ display: 'flex', alignItems: 'center' }}>
                            <strong style={{ fontSize: '0.8rem' }}>{m.name}</strong>
                            <button onClick={() => { setSelectedMed(m); setAiQuestion(''); setAiResponse(''); }} style={{ border: 'none', background: 'none', cursor: 'pointer', color: 'var(--color-primary)', display: 'inline-flex', alignItems: 'center', marginLeft: '0.4rem', padding: '2px' }} title="Ask AI Info">
                              <Icon name="info" size={14} />
                            </button>
                          </div>
                          <p style={{ fontSize: '0.65rem', color: 'var(--text-muted)', marginTop: '0.1rem', margin: 0 }}>🕒 {m.time} &bull; Stock: {m.remaining}/{m.total}</p>
                        </div>
                        <button className="btn btn-secondary" onClick={() => logMedicineDose(activeMemberId, m.id)} disabled={m.remaining === 0} style={{ height: '28px', padding: '0 0.5rem', fontSize: '0.7rem', borderRadius: '4px' }}>Take</button>
                      </div>
                    ))}
                  </div>
                ) : <p style={{ color: 'var(--text-secondary)', fontSize: '0.8rem', textAlign: 'center', padding: '1rem' }}>No active routines logged.</p>}
              </div>

              <div className="glass-panel" style={{ padding: '1rem' }}>
                <h3 style={{ fontSize: '0.95rem', marginBottom: '0.75rem', margin: 0, textAlign: 'left' }}>Pharmacy Reorder Basket</h3>
                {medicines && medicines.length > 0 ? (
                  <div style={{ display: 'flex', flexDirection: 'column', gap: '0.35rem', marginTop: '0.5rem' }}>
                    {medicines.map(m => (
                      <label key={m.id} style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', padding: '0.35rem 0', borderBottom: '1px solid var(--border-color)', cursor: 'pointer', fontSize: '0.8rem', textAlign: 'left' }}>
                        <input type="checkbox" onChange={() => handleToggle(m)} checked={!!basket.find(x => x.id === m.id)} style={{ cursor: 'pointer' }} />
                        <span style={{ flex: 1 }}>{m.name}</span>
                        <span style={{ fontSize: '0.7rem', color: 'var(--text-muted)' }}>Stock: {m.remaining}</span>
                      </label>
                    ))}
                  </div>
                ) : <p style={{ color: 'var(--text-secondary)', fontSize: '0.8rem', textAlign: 'center', padding: '1rem' }}>No medication list to refill.</p>}
                <button className="btn btn-primary" onClick={handleOrder} style={{ width: '100%', marginTop: '1rem', background: 'var(--color-warning)', fontSize: '0.8rem' }} disabled={basket.length === 0}>
                  Order Refills (Rs. {basket.length * 350})
                </button>
              </div>
            </div>
          ) : (
            <div className="glass-panel" style={{ padding: '1.25rem' }}>
              <h3 style={{ fontSize: '0.95rem', marginBottom: '1rem', margin: 0, textAlign: 'left' }}>Immunization Schedule ({activeMember.name})</h3>
              {vaccinations && vaccinations.length > 0 ? (
                <div style={{ display: 'flex', flexDirection: 'column', gap: '0.75rem', marginTop: '0.5rem' }}>
                  {vaccinations.map(v => (
                    <div key={v.id} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0.65rem', border: '1px solid var(--border-color)', borderRadius: '8px' }}>
                      <div style={{ textAlign: 'left' }}>
                        <h4 style={{ fontWeight: 'bold', fontSize: '0.8rem', margin: 0 }}>{v.name}</h4>
                        <span style={{ fontSize: '0.7rem', color: 'var(--text-secondary)' }}>Due: {v.ageDue} &bull; {v.dateDue}</span>
                      </div>
                      <button
                        className={`btn ${v.status === 'Given' ? 'btn-secondary' : 'btn-primary'}`}
                        onClick={() => updateVaccinationStatus(v.id, v.status === 'Given' ? 'Pending' : 'Given')}
                        style={{ height: '28px', padding: '0 0.5rem', fontSize: '0.7rem', borderRadius: '4px' }}
                      >
                        {v.status === 'Given' ? '✔ Administered' : 'Mark'}
                      </button>
                    </div>
                  ))}
                </div>
              ) : (
                <p style={{ color: 'var(--text-secondary)', fontSize: '0.8rem', textAlign: 'center', padding: '1rem' }}>No immunization routine scheduled for this member.</p>
              )}
            </div>
          )}

          {/* Manual Add Reminder Modal */}
          {showAddReminderModal && (
            <div style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0, 0, 0, 0.75)', backdropFilter: 'blur(4px)', zIndex: 1200, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '1rem' }}>

                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', borderBottom: '1px solid #1e293b', paddingBottom: '0.5rem' }}>
                  <h3 style={{ fontSize: '0.9rem', color: '#fff', margin: 0 }}>➕ Add Medication Reminder</h3>
                  <button className="btn-icon" onClick={() => setShowAddReminderModal(false)} style={{ background: 'none', border: 'none', color: '#fff', cursor: 'pointer' }}><Icon name="x" size={16} /></button>

                <form onSubmit={handleAddManual} style={{ display: 'flex', flexDirection: 'column', gap: '0.75rem' }}>
                  <div className="form-group">

                    <input type="text" className="form-control" placeholder="e.g. Paracetamol" value={manualMedForm.name} onChange={e => setManualMedForm({ ...manualMedForm, name: e.target.value })} required style={{ fontSize: '0.75rem', padding: '0.35rem' }} />
                  </div>
                  
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '0.5rem' }}>
                    <div className="form-group">
                      <label style={{ fontSize: '0.65rem', color: 'var(--text-secondary)' }}>Dosage</label>

          {/* Interactive Crop Modal in Reminders */}
          {cropping && fileBase64 && (

                <div

                    setPin(val);

                <div style={{ background: 'var(--bg-primary)', padding: '0.75rem', borderRadius: '10px', fontSize: '0.75rem', border: '1px solid var(--border-color)', marginBottom: '1rem', textAlign: 'left' }}>
                  <strong>Medicine:</strong> {selectedMed.name} ({selectedMed.dosage || 'Standard Dosage'})

                <div style={{ background: 'var(--bg-glass)', border: '1px solid var(--border-color)', padding: '0.75rem', borderRadius: '10px', fontSize: '0.75rem', marginBottom: '1rem', textAlign: 'left' }}>

                    <div style={{ color: 'var(--text-muted)' }}>Querying FDA label library...</div>

                    <div style={{ display: 'flex', flexDirection: 'column', gap: '0.3rem', marginTop: '0.25rem' }}>
                      {fdaData.openfda?.generic_name?.[0] && <div><strong>Generic Name:</strong> {fdaData.openfda.generic_name[0]}</div>}
                      {fdaData.purpose?.[0] && <div><strong>Purpose:</strong> {fdaData.purpose[0].slice(0, 160)}...</div>}

                <div style={{ textAlign: 'left', marginBottom: '1rem' }}>

                    <button className="btn btn-primary" onClick={handleAskAI} disabled={loadingAi || !aiQuestion.trim()} style={{ fontSize: '0.75rem', padding: '0 0.75rem' }}>Ask AI</button>

                {aiResponse && (
                  <div style={{ textAlign: 'left', background: 'var(--bg-glass)', border: '1px solid var(--border-color)', padding: '1rem', borderRadius: '10px' }}>

    function AiAssistantTab() {
      const { 
        activeMember, 
        activeMemberId,
        medicines, 
        vitals, 
        geminiKey, 
        addToast 
      } = useContext(HealthContext);

      if (activeMemberId === 'household') {
        return <ProfileSelectionPrompt title="AI Health Assistant" />;
      }

      const [question, setQuestion] = useState('');
      const [aiAnswer, setAiAnswer] = useState('');
      const [loadingQ, setLoadingQ] = useState(false);

      const [selectedMeds, setSelectedMeds] = useState([]);
      const [interactionResult, setInteractionResult] = useState('');
      const [loadingInteractions, setLoadingInteractions] = useState(false);

      const [weeklyReport, setWeeklyReport] = useState('');
      const [loadingReport, setLoadingReport] = useState(false);

      const handleAskQ = async (e) => {
        e.preventDefault();
        if (!question.trim()) return;
        setLoadingQ(true);
        setAiAnswer('');

        if (geminiKey) {
          try {
            const prompt = `You are a professional medical assistant powered by Gemini. You must provide grounded, medically certified information.
Question: "${question}"
Provide a clear, clinical, yet easily readable answer. Keep it within 3-4 sentences. If you do not have verified medical information for this specific query, reply with: "No info".`;

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${geminiKey}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }],
                tools: [{ googleSearch: {} }]
              })
            });

            if (!response.ok) {
              const errJson = await response.json().catch(() => ({}));
              throw new Error(errJson.error?.message || `HTTP error ${response.status}`);
            }
            const data = await response.json();
            const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'No info';
            setAiAnswer(reply.trim());
          } catch (err) {
            setAiAnswer(`⚠️ API Connection Error: ${err.message}. Please check your settings or try again later.`);
          } finally {
            setLoadingQ(false);
          }
        } else {
          setTimeout(() => {
            const q = question.toLowerCase();
            let reply = "No info";
            if (q.includes('fever') || q.includes('temperature')) {
              reply = "For high body temperature (fever), rest, hydration, and cool compresses are typical supportive steps. Paracetamol or Ibuprofen are standard over-the-counter fever reducers. Consult a pediatrician or physician if temperature exceeds 102°F or persists for more than 48 hours.";
            } else if (q.includes('blood pressure') || q.includes('bp')) {
              reply = "Normal adult blood pressure is typically below 120/80 mmHg. Lifestyle modifications like reducing sodium intake (DASH diet), engaging in aerobic exercise, and stress management are primary ways to maintain healthy cardiovascular pressure.";
            } else if (q.includes('diabetes') || q.includes('glucose') || q.includes('sugar') || q.includes('hba1c')) {
              reply = "Managing blood glucose requires balancing dietary carbohydrates, physical activity, and prescribed medication (like Metformin). Regular monitoring of fasting sugar (normal 70-100 mg/dL) and HbA1c (normal < 5.7%) is vital.";
            }
            setAiAnswer(reply);
            setLoadingQ(false);
          }, 800);
        }
      };

      const handleCheckInteractions = async () => {
        if (selectedMeds.length < 2) {
          alert("Please select at least 2 medications to check for interactions.");
          return;
        }
        setLoadingInteractions(true);
        setInteractionResult('');

        const medNames = selectedMeds.join(', ');

        if (geminiKey) {
          try {
            const prompt = `You are a clinical pharmacist. Analyze the following list of medications for potential drug-drug interactions: [${medNames}].
For these medications:
1. Detail any verified moderate or severe clinical interactions.
2. Outline safety concerns or warning instructions for the patient.
3. If no interactions exist or are known, state: "No significant clinical interactions identified for this combination."
Keep the report concise (max 4 sentences) and structured.`;

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${geminiKey}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }]
              })
            });

            if (!response.ok) throw new Error("API failed");
            const data = await response.json();
            const text = data.candidates?.[0]?.content?.parts?.[0]?.text || 'No interaction data available.';
            setInteractionResult(text.trim());
          } catch (err) {
            setInteractionResult("No interaction data available.");
          } finally {
            setLoadingInteractions(false);
          }
        } else {
          setTimeout(() => {
            let reply = "No significant clinical interactions identified for this combination.";
            const hasStatin = selectedMeds.some(m => m.toLowerCase().includes('statin'));
            const hasMetformin = selectedMeds.some(m => m.toLowerCase().includes('metformin'));
            
            if (hasStatin && hasMetformin) {
              reply = "⚠️ Metformin + Atorvastatin: No major contraindications. However, statins can occasionally affect blood glucose control. Adherence to routine monitoring of HbA1c and liver enzymes is advised.";
            }
            setInteractionResult(reply);
            setLoadingInteractions(false);
          }, 800);
        }
      };

      const handleWeeklyReport = async () => {
        setLoadingReport(true);
        setWeeklyReport('');

        const latestGlucose = vitals.find(v => v.glucose !== null)?.glucose || 'N/A';
        const latestBP = vitals.find(v => v.bpSystolic !== null) ? `${vitals.find(v => v.bpSystolic !== null).bpSystolic}/${vitals.find(v => v.bpSystolic !== null).bpDiastolic}` : 'N/A';
        const medList = medicines.map(m => `${m.name} (${m.remaining}/${m.total} remaining)`).join(', ');

        if (geminiKey) {
          try {
            const prompt = `You are a personal wellness coach. Generate a weekly health report card for the patient "${activeMember.name}" (${activeMember.relation}) based on this actual logs data:
- Recent Blood Glucose: ${latestGlucose} mg/dL
- Recent Blood Pressure: ${latestBP} mmHg
- Current Meds: [${medList}]
Provide a structured, encouraging summary covering:
1. Vitals overview (highlighting if stable or out of range).
2. Adherence/Stock alerts.
3. Simple, actionable health goals for the next week.
Keep the output short, clean, and in standard markdown paragraphs (max 150 words).`;

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${geminiKey}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }]
              })
            });

            if (!response.ok) throw new Error("API failed");
            const data = await response.json();
            const text = data.candidates?.[0]?.content?.parts?.[0]?.text || 'No weekly report could be generated.';
            setWeeklyReport(text.trim());
          } catch (err) {
            setWeeklyReport("Failed to generate report.");
          } finally {
            setLoadingReport(false);
          }
        } else {
          setTimeout(() => {
            const report = `### 📋 Weekly Health Report Card: ${activeMember.name}
- **Vitals Overview**: Blood pressure (${latestBP} mmHg) and blood sugar (${latestGlucose} mg/dL) are generally within normal ranges. Pulse rate and temperature logs remain stable.
- **Medication Adherence**: Routine meds list contains ${medicines.length} items. Keep tracking dosage times.
- **Action Plan**: 
  1. Continue daily smartwatch vital syncing.
  2. Increase hydration level and maintain light walking.`;
            setWeeklyReport(report);
            setLoadingReport(false);
          }, 800);
        }
      };

      const handleToggleSelectMed = (name) => {
        if (selectedMeds.includes(name)) {
          setSelectedMeds(selectedMeds.filter(x => x !== name));
        } else {
          setSelectedMeds([...selectedMeds, name]);
        }
      };

      return (
        <div className="fade-in" style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
          
          {/* Ask AI Section */}
          <div className="glass-panel" style={{ padding: '1rem' }}>
            <h3 style={{ fontSize: '0.9rem', marginBottom: '0.5rem', color: 'var(--color-primary)' }}>🤖 Grounded Medicine Q&A</h3>
            <p style={{ fontSize: '0.65rem', color: 'var(--text-secondary)', marginBottom: '0.75rem' }}>Query clinical medicine libraries, side effects, or drug alternatives.</p>
            <form onSubmit={handleAskQ} style={{ display: 'flex', gap: '0.5rem' }}>
              <input 
                type="text" 
                placeholder="e.g., normal range for HbA1c?" 
                value={question} 
                onChange={e => setQuestion(e.target.value)} 
                className="form-control" 
                style={{ fontSize: '0.75rem' }} 
              />
              <button className="btn btn-primary" type="submit" disabled={loadingQ || !question.trim()} style={{ fontSize: '0.75rem' }}>Ask</button>
            </form>
            {aiAnswer && (
              <div style={{ marginTop: '0.75rem', background: 'var(--bg-primary)', padding: '0.75rem', borderRadius: '8px', fontSize: '0.72rem', textAlign: 'left', border: '1px solid var(--border-color)' }}>
                {aiAnswer === "No info" ? (
                  <span style={{ color: 'var(--text-secondary)' }}>⚠️ No authenticated medical information available for this query.</span>
                ) : (
                  <div>
                    <strong style={{ color: 'var(--color-primary)', display: 'block', marginBottom: '0.2rem' }}>Grounded Answer:</strong>
                    <p style={{ margin: 0, color: 'var(--text-primary)', lineHeight: '1.4' }}>{aiAnswer}</p>
                  </div>
                )}
              </div>
            )}
          </div>

          {/* Drug-Drug Interaction Checker */}
          <div className="glass-panel" style={{ padding: '1rem' }}>
            <h3 style={{ fontSize: '0.9rem', marginBottom: '0.5rem', color: 'var(--color-primary)' }}>🛡️ Drug Interaction Checker</h3>
            <p style={{ fontSize: '0.65rem', color: 'var(--text-secondary)', marginBottom: '0.75rem' }}>Select active routines to check for potential interactions.</p>
            
            {medicines.length > 0 ? (
              <div style={{ display: 'flex', flexDirection: 'column', gap: '0.35rem', marginBottom: '0.75rem' }}>
                {medicines.map(m => (
                  <label key={m.id} style={{ display: 'flex', alignItems: 'center', gap: '0.4rem', fontSize: '0.72rem', cursor: 'pointer' }}>
                    <input type="checkbox" checked={selectedMeds.includes(m.name)} onChange={() => handleToggleSelectMed(m.name)} />
                    <span>{m.name} ({m.dosage})</span>
                  </label>
                ))}
              </div>
            ) : <p style={{ fontSize: '0.7rem', color: 'var(--text-muted)', marginBottom: '0.5rem' }}>No medicines logged for this profile.</p>}

            <button className="btn btn-primary" onClick={handleCheckInteractions} disabled={loadingInteractions || selectedMeds.length < 2} style={{ width: '100%', fontSize: '0.75rem', padding: '0.4rem' }}>Check Interactions</button>
            {interactionResult && (
              <div style={{ marginTop: '0.75rem', background: 'var(--bg-primary)', padding: '0.75rem', borderRadius: '8px', fontSize: '0.72rem', textAlign: 'left', border: '1px solid var(--border-color)' }}>
                <strong style={{ color: 'var(--color-primary)', display: 'block', marginBottom: '0.2rem' }}>Safety Analysis:</strong>
                <p style={{ margin: 0, color: 'var(--text-primary)' }}>{interactionResult}</p>
              </div>
            )}
          </div>

          {/* Weekly Insights Generator */}
          <div className="glass-panel" style={{ padding: '1rem' }}>
            <h3 style={{ fontSize: '0.9rem', marginBottom: '0.5rem', color: 'var(--color-primary)' }}>📊 Weekly Insight Report Card</h3>
            <p style={{ fontSize: '0.65rem', color: 'var(--text-secondary)', marginBottom: '0.75rem' }}>Synthesize weekly vitals logs & med adherence into a wellness report.</p>
            <button className="btn btn-primary" onClick={handleWeeklyReport} disabled={loadingReport} style={{ width: '100%', fontSize: '0.75rem', padding: '0.4rem' }}>
              {loadingReport ? 'Generating report...' : 'Generate Report Card'}
            </button>
            {weeklyReport && (
              <div style={{ marginTop: '0.75rem', background: 'var(--bg-primary)', padding: '0.75rem', borderRadius: '8px', fontSize: '0.72rem', textAlign: 'left', border: '1px solid var(--border-color)', lineHeight: '1.4' }}>
                <div style={{ whiteSpace: 'pre-line', color: 'var(--text-primary)' }}>{weeklyReport}</div>
              </div>
            )}
          </div>

        </div>
      );
    }

      const [editForm, setEditForm] = useState({ name: '', relation: 'Spouse', mobile: '', age: '', gender: 'Female', pregnancyMode: false, pregnancyWeeks: 12, dueDate: '', newbornMode: false, birthDate: '', weight: '', bloodGroup: '', avatar: '', colorTheme: 'teal' });

    // Medicines scheduler & Reordering
    function MedicineScheduler() {
      const { activeMemberId, medicines, logMedicineDose, orderMedicines, geminiKey } = useContext(HealthContext);
      const [basket, setBasket] = useState([]);
      const [selectedMed, setSelectedMed] = useState(null);
      const [aiQuestion, setAiQuestion] = useState('');
      const [aiResponse, setAiResponse] = useState('');
      const [loadingAi, setLoadingAi] = useState(false);
      const [fdaData, setFdaData] = useState(null);
      const [loadingFda, setLoadingFda] = useState(false);

      const handleToggle = (m) => {
        if (basket.find(x => x.id === m.id)) setBasket(basket.filter(x => x.id !== m.id));
        else setBasket([...basket, m]);
      };

      const handleOrder = () => {
        if (basket.length === 0) return;
        const list = basket.map(b => b.name).join(', ');
        orderMedicines(list, basket.length * 350);
        setBasket([]);
      };

      useEffect(() => {
        if (!selectedMed) {
          setFdaData(null);
          return;
        }

        const fetchFDA = async () => {
          setLoadingFda(true);
          setFdaData(null);
          try {
            const cleanName = encodeURIComponent(selectedMed.name.trim().split(' ')[0]);
            const url = `https://api.fda.gov/drug/label.json?search=(openfda.brand_name:"${cleanName}"+openfda.generic_name:"${cleanName}")&limit=1`;
            const res = await fetch(url);
            if (res.ok) {
              const data = await res.json();
              if (data.results && data.results.length > 0) {
                setFdaData(data.results[0]);
                return;
              }
            }
            
            // Fallback loose search
            const looseUrl = `https://api.fda.gov/drug/label.json?search="${cleanName}"&limit=1`;
            const looseRes = await fetch(looseUrl);
            if (looseRes.ok) {
              const data = await looseRes.json();
              if (data.results && data.results.length > 0) {
                setFdaData(data.results[0]);
              }
            }
          } catch (e) {
            console.error("Error fetching openFDA data:", e);
          } finally {
            setLoadingFda(false);
          }
        };

        fetchFDA();
      }, [selectedMed]);

      const isMedicalQuestion = (q) => {
        const cleanQ = q.toLowerCase();
        const medicalKeywords = [
          'alternate', 'alternative', 'substitute', 'generic', 'other option', 'other brand',
          'use', 'purpose', 'what is it for', 'side effect', 'warning', 'danger', 'contraindication',
          'dosage', 'dose', 'drug class', 'interaction', 'safety', 'effect', 'mechanism',
          'how does it work', 'treatment', 'therapy', 'brand name', 'manufacturer'
        ];
        return medicalKeywords.some(keyword => cleanQ.includes(keyword));
      };

      const handleAskAI = async () => {
        if (!aiQuestion.trim()) return;
        setLoadingAi(true);
        setAiResponse('');

        if (!isMedicalQuestion(aiQuestion)) {
          setAiResponse("No info");
          setLoadingAi(false);
          return;
        }

        if (geminiKey) {
          try {
            const prompt = `You are a medically authenticated pharmacy assistant.
You are asked about the medicine: "${selectedMed.name}" (${selectedMed.dosage || 'Standard dosage'}).
Question: "${aiQuestion}".

CRITICAL DIRECTIVE:
Provide accurate, medically sound, and authenticated information. Focus strictly on answering the question (e.g. generic alternatives, drug class, standard uses, side effects, or drug interactions).
If the question is unrelated to the medicine or its alternatives/uses/effects, or if you do not have verified medical information for this specific query, you MUST reply with exactly: "No info" (or "No authenticated medical information available for this query."). Do not say anything else. Keep the response concise, max 3 sentences.`;

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${geminiKey}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }],
                tools: [{ googleSearch: {} }]
              })
            });

            if (!response.ok) {
              const errJson = await response.json().catch(() => ({}));
              throw new Error(errJson.error?.message || `HTTP error ${response.status}`);
            }

            const resJson = await response.json();
            const textResponse = resJson.candidates?.[0]?.content?.parts?.[0]?.text || '';
            setAiResponse(textResponse.trim());
          } catch (err) {
            console.error(err);
            setAiResponse(`⚠️ Error: ${err.message}`);
          } finally {
            setLoadingAi(false);
          }
        } else {
          // Client-Side Simulated / openFDA grounded lookup fallback (Works without key!)
          setTimeout(() => {
            const q = aiQuestion.toLowerCase();
            const name = selectedMed.name.toLowerCase();
            let reply = "No info";

            if (q.includes('alternate') || q.includes('alternative') || q.includes('substitute') || q.includes('generic') || q.includes('other option') || q.includes('other brand')) {
              if (fdaData && fdaData.openfda) {
                const generic = fdaData.openfda.generic_name?.[0];
                const brands = fdaData.openfda.brand_name?.slice(0, 5).filter(b => b.toLowerCase() !== name).join(', ');
                reply = '';
                if (generic) reply += `The generic name is ${generic}. `;
                if (brands && brands.length > 0) reply += `Common brand alternatives: ${brands}.`;
                else reply += `No alternative brand names found in FDA records.`;
              } else {
                if (name.includes('metformin')) {
                  reply = "Generic alternatives for Metformin include Glipizide, Glimepiride, or brand-name alternatives like Jardiance (Empagliflozin) and Januvia (Sitagliptin). Metformin remains the gold-standard first-line therapy for type 2 diabetes management.";
                } else if (name.includes('atorvastatin')) {
                  reply = "Alternatives to Atorvastatin include other statins like Rosuvastatin (Crestor), Simvastatin (Zocor), or Pravastatin. Non-statin alternatives like Ezetimibe can also be considered to manage lipid levels under medical supervision.";
                } else if (name.includes('multivitamin') || name.includes('iron') || name.includes('vitamin')) {
                  reply = "Alternatives depend on specific deficiencies. Dietary adjustments (e.g. spinach and red meat for iron, dairy for calcium) or alternative generic supplements are typical options.";
                }
              }
            } else if (q.includes('side effect') || q.includes('warning') || q.includes('danger') || q.includes('contraindication')) {
              if (fdaData) {
                const warnings = fdaData.warnings?.[0] || fdaData.adverse_reactions?.[0];
                if (warnings) reply = warnings.length > 250 ? warnings.slice(0, 250) + "..." : warnings;
              } else {
                if (name.includes('metformin')) {

    // Tools Tab wrapper (AI Parser + Wearables Connector Segment controls)
    function ToolsTab() {
      const [activeTool, setActiveTool] = useState('scanner'); // 'scanner' or 'wearables'
      const [mockReportType, setMockReportType] = useState('auto');
      const { logVitals, activeMember, geminiKey, uploadedRecords, setUploadedRecords, wearableSensors, setWearableSensors, addToast } = useContext(HealthContext);

      // AI Scanner States
      const [scanning, setScanning] = useState(false);
      const [data, setData] = useState(null);
      const [scanStep, setScanStep] = useState('');

      // File & Camera States
      const [selectedFile, setSelectedFile] = useState(null);
      const [fileBase64, setFileBase64] = useState('');
      const [dragActive, setDragActive] = useState(false);
      const [cameraActive, setCameraActive] = useState(false);
      const [stream, setStream] = useState(null);
      const [viewingRecord, setViewingRecord] = useState(null);

      // Wearables Sync States
      const [syncing, setSyncing] = useState(false);

      const videoRef = useRef(null);

      useEffect(() => {
        return () => {
          if (stream) {
            stream.getTracks().forEach(track => track.stop());
          }
        };
      }, [stream]);

      const startCamera = async () => {
        setSelectedFile(null);
        setFileBase64('');
        setData(null);
        setCameraActive(true);
        try {
          const s = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
          });
          setStream(s);
          if (videoRef.current) {
            videoRef.current.srcObject = s;
            videoRef.current.play().catch(err => console.error("Video play failed:", err));
          }
        } catch (err) {
          console.error("Camera access failed:", err);
          alert("Could not start live video stream. Use the native camera file picker or upload a document instead.");
          setCameraActive(false);
        }
      };

      const stopCamera = () => {
        if (stream) {
          stream.getTracks().forEach(track => track.stop());
          setStream(null);
        }
        setCameraActive(false);
      };

      const capturePhoto = () => {
        if (!videoRef.current) return;
        const video = videoRef.current;
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const dataUrl = canvas.toDataURL('image/jpeg');
        setFileBase64(dataUrl);
        setSelectedFile({
          name: 'Camera_Capture_' + new Date().toISOString().split('T')[0] + '_' + Math.floor(Math.random() * 1000) + '.jpg',
          type: 'image/jpeg',
          size: Math.round((dataUrl.length * 3) / 4)
        });
        stopCamera();
      };

      const handleFile = (file) => {
        if (!file) return;
        setSelectedFile(file);
        
        const reader = new FileReader();
        reader.onload = (e) => {
          setFileBase64(e.target.result);
        };
        reader.readAsDataURL(file);
      };

      const handleDrag = (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (e.type === "dragenter" || e.type === "dragover") {
          setDragActive(true);
        } else if (e.type === "dragleave") {
          setDragActive(false);
        }
      };

      const handleDrop = (e) => {
        e.preventDefault();
        e.stopPropagation();
        setDragActive(false);
        if (e.dataTransfer.files && e.dataTransfer.files[0]) {
          handleFile(e.dataTransfer.files[0]);
        }
      };

      const handleFileInputChange = (e) => {
        if (e.target.files && e.target.files[0]) {
          handleFile(e.target.files[0]);
        }
      };

      const triggerScan = async () => {
        console.log("triggerScan initiated. selectedFile:", selectedFile);
        if (!selectedFile) return;
        setScanning(true);
        setData(null);

        let currentBase64 = fileBase64;
        if (!currentBase64) {
          console.log("fileBase64 is empty. Reading file contents...");
          try {
            const reader = new FileReader();
            const readPromise = new Promise((resolve, reject) => {
              reader.onload = (e) => resolve(e.target.result);
              reader.onerror = (err) => reject(err);
            });
            reader.readAsDataURL(selectedFile);
            currentBase64 = await readPromise;
            setFileBase64(currentBase64);
            console.log("File read successfully, base64 length:", currentBase64.length);
          } catch (readErr) {
            console.error("FileReader failed:", readErr);
            addToast(`Failed to read file: ${readErr.message}`, 'danger');
            setScanning(false);
            return;
          }
        }

        setScanStep("Reading report metadata...");
        await new Promise(r => setTimeout(r, 600));
        setScanStep("Running OCR & structuring document text...");
        await new Promise(r => setTimeout(r, 800));

        if (geminiKey) {
          try {
            const base64Data = currentBase64.split(',')[1];
            const mimeType = selectedFile.type || 'application/pdf';

            const prompt = `You are an advanced, HIPAA-compliant Medical OCR and Data Integration Agent. Your purpose is processing clinical text images captured via a mobile device camera and systematically segregating the elements with 100% accuracy.

OPERATIONAL PROTOCOL DIRECTIVES:
1. HARD COLD READ: Scan and run multi-modal visual OCR on the document to extract all visible text layers (printed or handwritten) literally. Do NOT attempt to guess semantic context if text spacing is distorted.
2. NO HALLUCINATION: Extract values EXACTLY as they are printed in the document. If a data value, ID, amount, or date is missing, obscured, or absent from the source text, output null or an empty list. Never synthesize or simulate realistic-looking values.
3. CLINICAL SEGREGATION: Analyze the extracted clinical text and systematically organize the data elements into these four distinct database objects:
   - [Diagnosis]: Medical conditions, symptoms, clinical impressions, or disease identification codes.
   - [Advice]: General behavioral instructions, lifestyle changes, dietary restrictions, or follow-up timelines.
   - [Medications]: Drug names, dosages, frequencies, administration routes (e.g., Orally, IV), and durations.
   - [Tests]: Prescribed laboratory work, radiology scans, blood tests, or specialized screenings.
4. DATA SANITIZATION: If a specific category is absent in the document, map that data node as a true null or exclude it entirely. Do not inject placeholder values.
5. Also extract any vital sign parameters found:
   - bpSystolic / bpDiastolic, glucose, heartRate, oxygen, temperature, weight, hba1c, tsh, cholesterol, hdl, ldl, triglycerides, creatinine, hemoglobin.
6. REPORT DATE: Extract the date when the lab report or test was performed or collected. Return it in 'YYYY-MM-DD' format. If no date is found, return null.`;

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${geminiKey}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{
                  parts: [
                    { text: prompt },
                    { inline_data: { mime_type: mimeType, data: base64Data } }
                  ]
                }],
                generationConfig: {
                  temperature: 0.0,
                  responseMimeType: "application/json",
                  responseSchema: {
                    type: "OBJECT",
                    properties: {
                      ingestionError: { type: "BOOLEAN", description: "Set to true if there is distorted text, corrupted flows, or overlapping layout that makes text conversion unreliable." },
                      ingestionErrorMessage: { type: "STRING", description: "Detailed alert asking the user to upload a visual PNG/JPEG instead, if ingestionError is true." },
                      reportDate: { type: "STRING", description: "The date of the report or when the test was performed, in YYYY-MM-DD format. Return null if not found." },
                      bpSystolic: { type: "INTEGER", description: "Blood Pressure Systolic value in mmHg. Must be null if not explicitly in the report." },
                      bpDiastolic: { type: "INTEGER", description: "Blood Pressure Diastolic value in mmHg. Must be null if not explicitly in the report." },
                      glucose: { type: "INTEGER", description: "Blood Glucose value in mg/dL. Must be null if not explicitly in the report." },
                      heartRate: { type: "INTEGER", description: "Heart rate or pulse rate in BPM. Must be null if not explicitly in the report." },
                      oxygen: { type: "INTEGER", description: "Blood oxygen saturation SpO2 percentage. Must be null if not explicitly in the report." },
                      temperature: { type: "NUMBER", description: "Body temperature in degrees Fahrenheit. Must be null if not explicitly in the report." },
                      weight: { type: "NUMBER", description: "Weight in kilograms. Must be null if not explicitly in the report." },
                      hba1c: { type: "NUMBER", description: "Glycated Hemoglobin HbA1c percentage. Must be null if not explicitly in the report." },
                      tsh: { type: "NUMBER", description: "Thyroid Stimulating Hormone TSH value in uIU/mL. Must be null if not explicitly in the report." },
                      cholesterol: { type: "INTEGER", description: "Total Cholesterol in mg/dL. Must be null if not explicitly in the report." },
                      hdl: { type: "INTEGER", description: "HDL Cholesterol in mg/dL. Must be null if not explicitly in the report." },
                      ldl: { type: "INTEGER", description: "LDL Cholesterol in mg/dL. Must be null if not explicitly in the report." },
                      triglycerides: { type: "INTEGER", description: "Triglycerides in mg/dL. Must be null if not explicitly in the report." },
                      creatinine: { type: "NUMBER", description: "Creatinine in mg/dL. Must be null if not explicitly in the report." },
                      hemoglobin: { type: "NUMBER", description: "Hemoglobin value in g/dL. Must be null if not explicitly in the report." },
                      notes: { type: "STRING", description: "Brief summary of report findings and observations, max 2 sentences. Must not be empty." },
                      diagnosis: {
                        type: "ARRAY",
                        items: { type: "STRING" }
                      },
                      advice: {
                        type: "ARRAY",
                        items: { type: "STRING" }
                      },
                      medications: {
                        type: "ARRAY",
                        items: {
                          type: "OBJECT",
                          properties: {
                            name: { type: "STRING" },
                            dosage: { type: "STRING" },
                            frequency: { type: "STRING" },
                            route: { type: "STRING" },
                            duration: { type: "STRING" }
                          },
                          required: ["name"]
                        }
                      },
                      tests: {
                        type: "ARRAY",
                        items: { type: "STRING" }
                      }
                    },
                    required: ["notes"]
                  }
                }
              })
            });

            if (!response.ok) {
              const errBody = await response.json().catch(() => ({}));
              const errMsg = errBody.error?.message || response.statusText;
              throw new Error(`Gemini API error: ${errMsg}`);
            }

            const resJson = await response.json();
            const textResponse = resJson.candidates?.[0]?.content?.parts?.[0]?.text || '';
            
            let cleanJsonText = textResponse.trim();
            const start = cleanJsonText.indexOf('{');
            const end = cleanJsonText.lastIndexOf('}');
            if (start !== -1 && end !== -1 && end > start) {
              cleanJsonText = cleanJsonText.substring(start, end + 1);
            }
            
            const extracted = JSON.parse(cleanJsonText);

            const cleanVal = (val, isFloat = false) => {
              if (val === null || val === undefined || val === '' || val === 404 || val === '404' || val === -999 || val === '-999' || val === -99 || val === '-99') {
                return null;
              }
              const num = isFloat ? parseFloat(val) : parseInt(val);
              return isNaN(num) ? null : num;
            };

            setData({
              ingestionError: !!extracted.ingestionError,
              ingestionErrorMessage: extracted.ingestionErrorMessage || '',
              date: extracted.reportDate || new Date().toISOString().split('T')[0],
              vitals: {
                bpSystolic: cleanVal(extracted.bpSystolic),
                bpDiastolic: cleanVal(extracted.bpDiastolic),
                glucose: cleanVal(extracted.glucose),
                weight: cleanVal(extracted.weight, true),
                heartRate: cleanVal(extracted.heartRate),
                oxygen: cleanVal(extracted.oxygen),
                temperature: cleanVal(extracted.temperature, true),
                hba1c: cleanVal(extracted.hba1c, true),
                tsh: cleanVal(extracted.tsh, true),
                cholesterol: cleanVal(extracted.cholesterol),
                hdl: cleanVal(extracted.hdl),
                ldl: cleanVal(extracted.ldl),
                triglycerides: cleanVal(extracted.triglycerides),
                creatinine: cleanVal(extracted.creatinine, true),
                hemoglobin: cleanVal(extracted.hemoglobin, true)
              },
              notes: extracted.notes || 'AI Scanner: Extracted records.',
              diagnosis: Array.isArray(extracted.diagnosis) ? extracted.diagnosis.filter(Boolean) : [],
              advice: Array.isArray(extracted.advice) ? extracted.advice.filter(Boolean) : [],
              medications: Array.isArray(extracted.medications) ? extracted.medications.filter(m => m && m.name) : [],
              tests: Array.isArray(extracted.tests) ? extracted.tests.filter(Boolean) : []
            });

          } catch (err) {
            console.error(err);
            addToast(`AI Scan failed: ${err.message}`, 'danger');
            setScanStep(`Scan failed: ${err.message}`);
          } finally {
            setScanning(false);
          }
        } else {
          setScanStep("Using client-side matcher (Add Gemini Key in settings for live AI)...");
          await new Promise(r => setTimeout(r, 1200));
          runMockScan();
          setScanning(false);
        }
      };

      const runMockScan = () => {
        const fname = (selectedFile ? selectedFile.name : '').toLowerCase();
        
        let selectedType = mockReportType;
        if (selectedType === 'auto') {

                className="btn-icon" 
                onClick={() => setShowSettings(true)} 
                style={{ width: '32px', height: '32px', borderRadius: '8px', border: '1px solid var(--border-color)', background: 'var(--bg-primary)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}
                title="AI Configuration Settings"
              >
                ⚙️
              </button>
            </div>
          </div>

          {/* Main scroll wrapper */}
          <div className="phone-scroll-area">
            {renderTab()}
          </div>

          {/* Translucent bottom tabs bar */}
          <div className="bottom-nav">
            <button className={`nav-item ${activeTab === 'dashboard' ? 'active' : ''}`} onClick={() => { setActiveTab('dashboard'); setActiveMemberId('household'); }}>
              <Icon name="dashboard" size={20} />
              <span>Home</span>
            </button>
            <button className={`nav-item ${activeTab === 'track' ? 'active' : ''}`} onClick={() => setActiveTab('track')}>
              <Icon name="activity" size={20} />
              <span>Track</span>
            </button>
            <button className={`nav-item ${activeTab === 'records' ? 'active' : ''}`} onClick={() => setActiveTab('records')}>
              <Icon name="file" size={20} />
              <span>Records</span>
            </button>
            <button className={`nav-item ${activeTab === 'remind' ? 'active' : ''}`} onClick={() => setActiveTab('remind')}>
              <Icon name="bell" size={20} />
              <span>Remind</span>
            </button>
            <button className={`nav-item ${activeTab === 'ai' ? 'active' : ''}`} onClick={() => setActiveTab('ai')}>
              <Icon name="helpCircle" size={20} />
              <span>AI</span>
            </button>
          </div>

          {/* Settings Modal (Slide-up sheet format) */}
          {showSettings && (
            <div className="bottom-sheet-overlay">
              <div className="bottom-sheet" style={{ maxHeight: '85vh', overflowY: 'auto' }}>
                <div className="sheet-handle"></div>
                <h3 style={{ fontSize: '1.1rem', marginBottom: '0.75rem' }}>Configuration Settings</h3>
                
                <h4 style={{ fontSize: '0.8rem', color: 'var(--color-primary)', marginBottom: '0.5rem' }}>AI Scanner & Q&A</h4>
                <div className="form-group">
                  <label>Gemini API Key</label>
                  <input type="password" className="form-control" value={apiKeyInput} onChange={e => setApiKeyInput(e.target.value)} placeholder="AIzaSy..." />
                </div>
                
                <h4 style={{ fontSize: '0.8rem', color: 'var(--color-primary)', marginTop: '1rem', marginBottom: '0.5rem' }}>Firebase Cloud Sync (Optional)</h4>
                <div className="form-group">
                  <label>Firebase API Key</label>
                  <input type="password" className="form-control" value={fbApiKey} onChange={e => setFbApiKey(e.target.value)} placeholder="AIzaSy..." />
                </div>
                <div className="form-group">
                  <label>Firebase Project ID</label>
                  <input type="text" className="form-control" value={fbProjectId} onChange={e => setFbProjectId(e.target.value)} placeholder="family-health-..." />
                </div>
                <div className="form-group">
                  <label>Firebase Auth Domain</label>
                  <input type="text" className="form-control" value={fbAuthDomain} onChange={e => setFbAuthDomain(e.target.value)} placeholder="family-health-....firebaseapp.com" />
                </div>
                <div className="form-group">
                  <label>Firebase Storage Bucket</label>
                  <input type="text" className="form-control" value={fbStorageBucket} onChange={e => setFbStorageBucket(e.target.value)} placeholder="family-health-....appspot.com" />
                </div>
                <div className="form-group">
                  <label>Firebase App ID</label>
                  <input type="text" className="form-control" value={fbAppId} onChange={e => setFbAppId(e.target.value)} placeholder="1:1234:web:abcd..." />
                </div>
                
                <div style={{ display: 'flex', gap: '0.5rem', marginBottom: '0.5rem', marginTop: '1rem' }}>
                  <button className="btn btn-secondary" onClick={handleTestKey} disabled={testingKey} style={{ flex: 1, margin: 0 }}>
                    {testingKey ? 'Testing...' : 'Test AI Key'}
                  </button>
                  <button className="btn btn-primary" onClick={() => {
                    setGeminiKey(apiKeyInput.trim());
                    saveFirebaseConfig({
                      apiKey: fbApiKey.trim(),
                      authDomain: fbAuthDomain.trim(),
                      projectId: fbProjectId.trim(),
                      storageBucket: fbStorageBucket.trim(),
                      appId: fbAppId.trim()
                    });
                    setShowSettings(false);
                  }} style={{ flex: 1, margin: 0 }}>
                    Save Settings
                  </button>
                </div>
                <button className="btn btn-secondary" onClick={() => setShowSettings(false)} style={{ width: '100%' }}>Cancel</button>
              </div>
            </div>
          )}

          {/* Notifications Modal (Slide-up sheet format) */}
          {showNotifications && (
            <div className="bottom-sheet-overlay" style={{ zIndex: 1100 }} onClick={() => setShowNotifications(false)}>
              <div className="bottom-sheet" style={{ maxHeight: '80vh', overflowY: 'auto' }} onClick={e => e.stopPropagation()}>
                <div className="sheet-handle"></div>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem', borderBottom: '1px solid var(--border-color)', paddingBottom: '0.5rem' }}>
                  <h3 style={{ fontSize: '1rem', fontWeight: 'bold', margin: 0, display: 'flex', alignItems: 'center', gap: '0.4rem' }}>
                    🔔 Active Health Alerts
                  </h3>
                  <button className="btn-icon" onClick={() => setShowNotifications(false)} style={{ background: 'none', border: 'none', cursor: 'pointer' }}>
                    <Icon name="x" size={18} color="var(--text-secondary)" />
                  </button>
                </div>
                
                <div style={{ display: 'flex', flexDirection: 'column', gap: '0.75rem' }}>
                  <div className="glass-panel" style={{ padding: '0.8rem', borderLeft: '4px solid var(--color-warning)', background: 'rgba(234, 179, 8, 0.03)', display: 'flex', flexDirection: 'column', gap: '0.2rem', textAlign: 'left' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                      <strong style={{ fontSize: '0.78rem', color: 'var(--color-warning)' }}>⚠️ Metformin Refill Alert</strong>
                      <span style={{ fontSize: '0.55rem', color: 'var(--text-muted)' }}>Just now</span>
                    </div>
                    <p style={{ fontSize: '0.7rem', color: 'var(--text-primary)', margin: 0 }}>
                      Vasu's Metformin stock is running extremely low (5 tablets remaining). Tap to order refills.
                    </p>
                    <button 
                      onClick={() => {
                        setShowNotifications(false);
                        setActiveTab('reminders');
                      }} 
                      style={{ alignSelf: 'flex-start', border: 'none', background: 'none', padding: 0, color: 'var(--color-primary)', fontSize: '0.65rem', fontWeight: 'bold', cursor: 'pointer', marginTop: '0.2rem' }}
                    >
                      Go to Reminders →
                    </button>
                  </div>

                  <div className="glass-panel" style={{ padding: '0.8rem', borderLeft: '4px solid var(--color-primary)', background: 'rgba(59, 130, 246, 0.03)', display: 'flex', flexDirection: 'column', gap: '0.2rem', textAlign: 'left' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                      <strong style={{ fontSize: '0.78rem', color: 'var(--color-primary)' }}>📅 Scheduled Lab Screenings</strong>
                      <span style={{ fontSize: '0.55rem', color: 'var(--text-muted)' }}>2 hours ago</span>
                    </div>
                    <p style={{ fontSize: '0.7rem', color: 'var(--text-primary)', margin: 0 }}>
                      Emily's routine HbA1c screening is due this week based on the clinical recommendation extracted from her last report.
                    </p>
                    <button 
                      onClick={() => {
                        setShowNotifications(false);
                        setActiveTab('records');
                      }} 
                      style={{ alignSelf: 'flex-start', border: 'none', background: 'none', padding: 0, color: 'var(--color-primary)', fontSize: '0.65rem', fontWeight: 'bold', cursor: 'pointer', marginTop: '0.2rem' }}
                    >
                      View Lab Records →
                    </button>
                  </div>

                  <div className="glass-panel" style={{ padding: '0.8rem', borderLeft: '4px solid var(--color-danger)', background: 'rgba(239, 68, 68, 0.03)', display: 'flex', flexDirection: 'column', gap: '0.2rem', textAlign: 'left' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                      <strong style={{ fontSize: '0.78rem', color: 'var(--color-danger)' }}>⌚ Wearable Anomalies</strong>
                      <span style={{ fontSize: '0.55rem', color: 'var(--text-muted)' }}>5 hours ago</span>
                    </div>
                    <p style={{ fontSize: '0.7rem', color: 'var(--text-primary)', margin: 0 }}>
                      Heart rate peak alert: Grandpa's pulse rate reached 108 BPM while asleep. SpO2 remained stable at 97%.
                    </p>
                    <button 
                      onClick={() => {
                        setShowNotifications(false);
                        setActiveTab('dashboard');
                      }} 
                      style={{ alignSelf: 'flex-start', border: 'none', background: 'none', padding: 0, color: 'var(--color-primary)', fontSize: '0.65rem', fontWeight: 'bold', cursor: 'pointer', marginTop: '0.2rem' }}
                    >
                      View Smartwatch Telemetry →
                    </button>
                  </div>
                </div>

                <button 
                  className="btn btn-secondary" 
                  onClick={() => setShowNotifications(false)} 
                  style={{ width: '100%', marginTop: '1.25rem', fontSize: '0.75rem', padding: '0.45rem' }}
                >
                  Close
                </button>
              </div>
            </div>
          )}

          {/* Toaster Alerts */}
          <ToastsStack />
        </div>
      );
    }

    function App() {
      return (
        <HealthProvider>
          <AppContent />
          <PresentationConsole />
        </HealthProvider>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('app-root'));
    root.render(<App />);
  </script>
</body>
</html>
