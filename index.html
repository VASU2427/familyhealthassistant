<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🩺</text></svg>" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FamilyHealth — Smart Family Healthcare</title>
  
  <!-- PWA & Mobile Install Capability -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0e9f6e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="FamilyHealth" />
  <link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230e9f6e'/><text y='70' x='15' font-size='60'>🩺</text></svg>" />
  
  <script>
    window.onerror = function (message, source, lineno, colno, error) {
      const errorDiv = document.createElement('div');
      errorDiv.style.position = 'fixed';
      errorDiv.style.top = '10px';
      errorDiv.style.left = '10px';
      errorDiv.style.right = '10px';
      errorDiv.style.background = 'rgba(239, 68, 68, 0.98)';
      errorDiv.style.color = '#fff';
      errorDiv.style.padding = '12px';
      errorDiv.style.borderRadius = '8px';
      errorDiv.style.zIndex = '999999';
      errorDiv.style.fontFamily = 'monospace';
      errorDiv.style.fontSize = '12px';
      errorDiv.style.boxShadow = '0 4px 12px rgba(0,0,0,0.15)';
      errorDiv.style.whiteSpace = 'pre-wrap';
      errorDiv.innerHTML = `<strong>⚠️ Application Error:</strong><br/>${message}<br/><small>at ${source}:${lineno}:${colno}</small><br/><br/><button onclick="this.parentElement.remove()" style="background:#fff;color:#ef4444;border:none;padding:4px 8px;border-radius:4px;cursor:pointer;font-weight:bold;">Dismiss</button>`;
      document.body.appendChild(errorDiv);
      return false;
    };

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('PWA ServiceWorker registered successfully.'))
          .catch(err => console.error('PWA ServiceWorker registration failed:', err));
      });
    }
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet" />

  <!-- UMD Scripts for React & Babel (Robust standard CDN) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js" crossorigin></script>

  <!-- Firebase Compat CDN SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>

  <style>
    :root {
      /* Cool slate & emerald teal color system matching screenshots */
      --bg-primary: #f8fafc; /* light slate background */
      --bg-secondary: #ffffff; /* pure white cards */
      --bg-glass: rgba(255, 255, 255, 0.9);
      --border-color: #e2e8f0; /* slate-200 border */
      --border-focus: #0e9f6e;
      
      --text-primary: #0f172a; /* slate-900 */
      --text-secondary: #475569; /* slate-600 */
      --text-muted: #94a3b8; /* slate-400 */
      
      --color-primary: #0e9f6e; /* emerald teal green */
      --color-primary-light: #def7ec;
      --color-success: #16a34a; /* success green */
      --color-success-light: #dcfce7;
      --color-info: #2563eb; /* royal blue */
      --color-info-light: #dbeafe;
      --color-warning: #d97706; /* amber orange */
      --color-warning-light: #fef3c7;
      --color-danger: #dc2626; /* coral red */
      --color-danger-light: #fee2e2;
      
      --font-display: 'Outfit', sans-serif;
      --font-body: 'Inter', sans-serif;
      
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 20px;
      --radius-full: 9999px;
      
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.08);
      --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.12);
      
      --transition-smooth: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    [data-theme="dark"] {
      --bg-primary: #0b0f17;
      --bg-secondary: #121824;
      --bg-glass: rgba(18, 24, 36, 0.85);
      --border-color: rgba(255, 255, 255, 0.08);
      --border-focus: #0a9e7c;
      
      --text-primary: #f8fafc;
      --text-secondary: #cbd5e1;
      --text-muted: #64748b;
      
      --color-primary: #0a9e7c;
      --color-primary-light: rgba(10, 158, 124, 0.15);
      --color-success: #639922;
      --color-success-light: rgba(99, 153, 34, 0.15);
      --color-info: #378add;
      --color-info-light: rgba(55, 138, 221, 0.15);
      --color-warning: #ef9f27;
      --color-warning-light: rgba(239, 159, 39, 0.15);
      --color-danger: #e8593c;
      --color-danger-light: rgba(232, 89, 96, 0.15);
      
      --shadow-md: 0 4px 20px rgba(0,0,0,0.4);
      --shadow-lg: 0 8px 40px rgba(0,0,0,0.6);
    }

    html {
      font-size: 17.5px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: radial-gradient(circle at 10% 20%, #e0f2fe 0%, #f0fdf4 50%, #fef3c7 100%);
      color: var(--text-primary);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      margin: 0;
      padding: 0;
      transition: background-color 0.4s;
    }

    /* Background blobs for premium depth styling */
    .bg-blob {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      filter: blur(120px);
      z-index: -1;
      opacity: 0.4;
    }
    .bg-blob-1 { top: -10%; left: -10%; background: var(--color-primary-light); }
    .bg-blob-2 { bottom: -10%; right: -10%; background: var(--color-warning-light); }

    h1, h2, h3, h4, h5, h6 {
      font-family: var(--font-display);
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    /* Container for simulated phone mockup */
    .phone-container {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .phone-frame {
      width: 390px;
      height: 844px;
      background: var(--bg-primary);
      border-radius: 46px;
      box-shadow: 
        0 0 0 12px #1e293b, /* Phone Bezel Frame */
        0 30px 60px rgba(0, 0, 0, 0.35);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border: 4px solid #0f172a;
      transition: var(--transition-smooth);
    }

    /* Dynamic Island Notch */
    .phone-notch {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 110px;
      height: 28px;
      background: #000000;
      border-radius: 14px;
      z-index: 1000;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Top Status Bar */
    .status-bar {
      height: 48px;
      padding: 12px 20px 0 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.72rem;
      font-weight: 600;
      color: #ffffff;
      background: var(--color-primary);
      z-index: 999;
      flex-shrink: 0;
      transition: background-color 0.4s;
    }
    .status-icons {
      display: flex;
      gap: 5px;
      align-items: center;
    }

    /* Sticky Bottom Nav Bar */
    .bottom-nav {
      height: 76px;
      background: var(--bg-glass);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid var(--border-color);
      display: flex;
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 998;
      padding-bottom: 12px; /* safe area bar offset */
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 0.62rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition-smooth);
      position: relative;
    }

    .nav-item.active {
      color: var(--color-primary);
      font-weight: 600;
    }

    .nav-item::after {
      content: '';
      position: absolute;
      bottom: 4px;
      width: 16px;
      height: 3px;
      border-radius: 2px;
      background: var(--color-primary);
      transform: scaleX(0);
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .nav-item.active::after {
      transform: scaleX(1);
    }

    /* Scroll area inside phone mockup */
    .phone-scroll-area {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem 1rem 90px 1rem;
      scrollbar-width: none;
    }
    .phone-scroll-area::-webkit-scrollbar {
      display: none;
    }

    /* Glass Panels */
    .glass-panel {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
      transition: var(--transition-smooth);
      overflow: hidden;
    }

    .glass-panel:hover {
      box-shadow: var(--shadow-md);
      border-color: rgba(10, 158, 124, 0.25);
      transform: translateY(-2px);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      padding: 0.65rem 1.25rem;
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 0.85rem;
      border-radius: var(--radius-sm);
      border: none;
      cursor: pointer;
      transition: var(--transition-smooth);
      text-decoration: none;
    }

    .btn-primary {
      background: var(--color-primary);
      color: #ffffff;
    }
    .btn-primary:hover {
      background: var(--color-primary);
      transform: translateY(-1px);
      box-shadow: 0 4px 10px var(--color-primary-light);
    }

    .btn-secondary {
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
    }
    .btn-secondary:hover {
      background: var(--border-color);
    }

    .btn-icon {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-sm);
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: var(--transition-smooth);
    }
    .btn-icon:hover {
      color: var(--color-primary);
      border-color: var(--color-primary);
    }

    /* Vitals grid specific */
    .vital-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }

    .vital-card {
      padding: 1rem;
      display: flex;
      flex-direction: column;
      position: relative;
      cursor: pointer;
    }

    .vital-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: var(--card-accent, var(--color-primary));
    }

    .vital-card.active-card {
      border-color: var(--card-accent, var(--color-primary));
      box-shadow: var(--shadow-md);
    }

    .vital-value {
      font-size: 1.65rem;
      font-weight: 700;
      font-family: var(--font-display);
      margin: 0.25rem 0;
      display: flex;
      align-items: baseline;
      gap: 0.15rem;
    }
    .vital-value span {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .pulse-animation {
      animation: pulse var(--pulse-speed, 1s) infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.18); opacity: 0.85; }
    }

    .scan-line {
      position: absolute;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--color-primary), transparent);
      box-shadow: 0 0 10px var(--color-primary);
      animation: scan 3s infinite linear;
    }

    @keyframes scan {
      0% { top: 0%; }
      50% { top: 100%; }
      100% { top: 0%; }
    }

    .graph-container {
      padding: 1rem;
      height: 260px;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 0.35rem;
    }

    .form-control {
      width: 100%;
      padding: 0.6rem 0.8rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-color);
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 0.85rem;
      transition: var(--transition-smooth);
    }

    .form-control:focus {
      outline: none;
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px var(--color-primary-light);
    }

    .alert-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.2rem 0.5rem;
      border-radius: var(--radius-full);
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .alert-badge.danger { background: var(--color-danger-light); color: var(--color-danger); }
    .alert-badge.warning { background: var(--color-warning-light); color: var(--color-warning); }
    .alert-badge.success { background: var(--color-success-light); color: var(--color-success); }
    .alert-badge.info { background: var(--color-info-light); color: var(--color-info); }

    /* Horizontal Family Scroll */
    .family-scroll {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 6px;
      scrollbar-width: none;
      margin-bottom: 0.25rem;
      -webkit-overflow-scrolling: touch;
    }
    .family-scroll::-webkit-scrollbar {
      display: none;
    }
    .member-pill {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      padding: 10px 8px;
      border-radius: var(--radius-md);
      border: 2px solid transparent;
      transition: var(--transition-smooth);
      background: var(--bg-secondary);
      min-width: 82px;
    }
    .member-pill.selected {
      border-color: var(--color-primary);
      background: var(--color-primary-light);
    }
    .member-avatar-circle {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: var(--bg-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      border: 2px solid transparent;
      transition: var(--transition-smooth);
    }
    .member-pill.selected .member-avatar-circle {
      border-color: var(--color-primary);
      background: var(--bg-secondary);
    }
    .member-name-label {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-primary);
    }
    .member-relation-label {
      font-size: 0.65rem;
      color: var(--text-muted);
    }

    /* Slide-up bottom sheets for modals */
    .bottom-sheet-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(4px);
      z-index: 1100;
      display: flex;
      align-items: flex-end;
    }
    .bottom-sheet {
      width: 100%;
      background: var(--bg-secondary);
      border-radius: 28px 28px 0 0;
      padding: 1.25rem 1.25rem 2rem 1.25rem;
      max-height: 85%;
      overflow-y: auto;
      box-shadow: 0 -8px 24px rgba(0, 0, 0, 0.15);
      animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .sheet-handle {
      width: 40px;
      height: 4px;
      background: var(--border-color);
      border-radius: var(--radius-full);
      margin: 0 auto 1.25rem auto;
    }

    /* Progress tracker */
    .progress-bar-container {
      width: 100%;
      height: 6px;
      background: var(--border-color);
      border-radius: var(--radius-full);
      overflow: hidden;
      margin-top: 0.4rem;
      position: relative;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--color-primary) 0%, var(--color-success) 100%);
      border-radius: var(--radius-full);
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Waveform voice animation */
    .voice-wave-container {
      display: flex;
      align-items: center;
      gap: 3px;
      height: 24px;
      margin-top: 0.4rem;
    }
    .voice-bar {
      width: 3px;
      height: 100%;
      background: var(--color-success);
      border-radius: var(--radius-full);
      animation: voiceWave 1s ease-in-out infinite alternate;
    }
    .voice-bar:nth-child(2) { animation-delay: 0.15s; }
    .voice-bar:nth-child(3) { animation-delay: 0.3s; }
    .voice-bar:nth-child(4) { animation-delay: 0.45s; }
    .voice-bar:nth-child(5) { animation-delay: 0.2s; }
    @keyframes voiceWave {
      0% { height: 4px; }
      100% { height: 24px; }
    }

    /* Tooltip styling for SVG hover items */
    .chart-tooltip {
      position: absolute;
      background: rgba(15, 23, 42, 0.95);
      color: #fff;
      padding: 0.5rem 0.75rem;
      border-radius: var(--radius-sm);
      font-size: 0.7rem;
      font-weight: 500;
      pointer-events: none;
      z-index: 1200;
      opacity: 0;
      transition: opacity 0.2s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* Toaster Notifications */
    .toast-container {
      position: absolute;
      bottom: 84px;
      left: 12px;
      right: 12px;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      z-index: 1099;
    }
    .toast-card {
      padding: 0.75rem 1rem;
      border-radius: var(--radius-sm);
      background: var(--bg-secondary);
      border-left: 4px solid var(--color-primary);
      box-shadow: var(--shadow-md);
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: toastIn 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
    }
    @keyframes toastIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* Speech recognition animation indicator */
    .mic-listening {
      position: relative;
    }
    .mic-listening::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 2px solid var(--color-danger);
      animation: ping 1s cubic-bezier(0, 0, 0.2, 1) infinite;
    }
    @keyframes ping {
      75%, 100% { transform: scale(1.6); opacity: 0; }
    }

    /* Presentation Console */
    .presentation-console {
      position: fixed;
      bottom: 20px;
      left: 20px;
      z-index: 1001;
      width: 320px;
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid var(--color-primary);
      border-radius: var(--radius-sm);
      color: #f8fafc;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      overflow: hidden;
      transition: var(--transition-smooth);
    }
    .presentation-header {
      padding: 0.75rem 1rem;
      background: var(--color-primary);
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }
    .presentation-body {
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .preset-btn {
      width: 100%;
      padding: 0.5rem 0.75rem;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: var(--radius-sm);
      color: #cbd5e1;
      text-align: left;
      cursor: pointer;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: var(--transition-smooth);
    }
    .preset-btn:hover {
      background: var(--color-primary-light);
      color: var(--color-primary);
      border-color: var(--color-primary);
    }

    /* Fade-in tab animations */
    .fade-in {
      animation: fadeIn 0.3s ease-out;
    }

    /* Premium visual styling matching the screenshots */
    .family-members-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.8rem;
    }
    
    .family-members-scroll {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding: 4px 4px 10px 4px;
      margin-bottom: 1.25rem;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .family-members-scroll::-webkit-scrollbar {
      display: none;
    }
    
    .member-circle-pill {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      width: 72px;
      padding: 6px;

    /* Glance Health Summary Card Styles */

    /* Vitals grid for active member home summary */
    .home-vitals-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;

    .home-vital-title {

    .home-vital-val {

    /* Responsive: on actual mobile viewports, remove the desktop frame decorations */
    @media (max-width: 500px) {
      body {
        align-items: stretch;
        justify-content: stretch;
        background: var(--bg-primary);
      }
      .phone-container {
        width: 100vw;
        height: 100vh;
      }
      .phone-frame {
        width: 100vw;
        height: 100vh;
        border-radius: 0;
        box-shadow: none;
        border: none;
      }
      .phone-notch {

      }
      .presentation-console {
        display: none; /* Hide presenter tools on real phone screens */
      }

    /* Camera Laser Scanning Animation */
    .scan-guide-overlay {
      position: absolute;
      top: 15px;
      left: 15px;
      right: 15px;
      bottom: 15px;
      border: 2px solid rgba(16, 185, 129, 0.4);
      border-radius: 8px;
      pointer-events: none;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.5);
      overflow: hidden;
    }
    
    .scan-laser-line {
      position: absolute;
      left: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, transparent, #10b981, transparent);
      box-shadow: 0 0 8px #10b981;
      animation: laser-scan 2.5s infinite linear;
    }
    
    @keyframes laser-scan {
      0% { top: 0%; }
      50% { top: 100%; }
      100% { top: 0%; }
    }

    /* Floating Action Button Hover Scale */
    .fab-btn {
      transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.2s;
    }
    .fab-btn:hover {
      transform: scale(1.1);
    }
    .fab-btn:active {
      transform: scale(0.95);
    }
  </style>

<body>
  
  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>

  <div class="phone-container">
    <div id="app-root"></div>
  </div>
  
  <div id="chart-tooltip-el" class="chart-tooltip">Tooltip</div>

  <script type="text/babel">
    const { useState, useEffect, createContext, useContext, useRef } = React;

    // Dynamic Firebase Config from localStorage
    const initFirebase = () => {
      try {
        const savedConfig = localStorage.getItem('fh_firebase_config');
        if (savedConfig) {
          const config = JSON.parse(savedConfig);
          if (config && config.apiKey && config.projectId) {
            if (window.firebase && !window.firebase.apps.length) {
              window.firebase.initializeApp(config);
              window.firebase.firestore().enablePersistence().catch(err => {
                console.warn("Firestore persistence failed:", err.code);
              });
              console.log("Firebase initialized successfully with saved config.");
            }
          }
        }
      } catch (e) {
        console.error("Error initializing Firebase:", e);
      }
    };
    initFirebase();

    const reinitFirebase = (newConfig) => {
      try {
        if (window.firebase) {
          if (window.firebase.apps.length) {
            window.firebase.apps.forEach(app => app.delete());
          }
          window.firebase.initializeApp(newConfig);
          window.firebase.firestore().enablePersistence().catch(err => {
            console.warn("Firestore persistence failed:", err.code);
          });
          console.log("Firebase re-initialized with new config.");
          return true;
        }
      } catch (e) {
        console.error("Error re-initializing Firebase:", e);
        alert("Failed to initialize Firebase: " + e.message);
      }
      return false;
    };

    function getParameterStatus(name, val) {
      if (val === null || val === undefined || val === '') return null;
      const num = parseFloat(val);
      if (isNaN(num)) return null;

      if (name === 'hba1c') {
        if (num < 5.7) return { status: 'Normal', color: 'var(--color-success)', bg: 'rgba(16, 185, 129, 0.08)', border: 'rgba(16, 185, 129, 0.2)' };
        if (num < 6.5) return { status: 'Elevated', color: '#eab308', bg: 'rgba(234, 179, 8, 0.08)', border: 'rgba(234, 179, 8, 0.2)' };
        return { status: 'High', color: 'var(--color-danger)', bg: 'rgba(239, 68, 68, 0.08)', border: 'rgba(239, 68, 68, 0.2)' };
      }
      if (name === 'glucose') {
        if (num < 100) return { status: 'Normal', color: 'var(--color-success)', bg: 'rgba(16, 185, 129, 0.08)', border: 'rgba(16, 185, 129, 0.2)' };
        if (num < 140) return { status: 'Elevated', color: '#eab308', bg: 'rgba(234, 179, 8, 0.08)', border: 'rgba(234, 179, 8, 0.2)' };
        return { status: 'High', color: 'var(--color-danger)', bg: 'rgba(239, 68, 68, 0.08)', border: 'rgba(239, 68, 68, 0.2)' };
      }
      if (name === 'tsh') {
        if (num < 0.4) return { status: 'Low', color: '#3b82f6', bg: 'rgba(59, 130, 246, 0.08)', border: 'rgba(59, 130, 246, 0.2)' };
        if (num <= 4.5) return { status: 'Normal', color: 'var(--color-success)', bg: 'rgba(16, 185, 129, 0.08)', border: 'rgba(16, 185, 129, 0.2)' };
        return { status: 'High', color: 'var(--color-danger)', bg: 'rgba(239, 68, 68, 0.08)', border: 'rgba(239, 68, 68, 0.2)' };
      }
      if (name === 'cholesterol') {
        if (num < 200) return { status: 'Normal', color: 'var(--color-success)', bg: 'rgba(16, 185, 129, 0.08)', border: 'rgba(16, 185, 129, 0.2)' };
        if (num < 240) return { status: 'Elevated', color: '#eab308', bg: 'rgba(234, 179, 8, 0.08)', border: 'rgba(234, 179, 8, 0.2)' };
        return { status: 'High', color: 'var(--color-danger)', bg: 'rgba(239, 68, 68, 0.08)', border: 'rgba(239, 68, 68, 0.2)' };
      }
      if (name === 'ldl') {
        if (num < 100) return { status: 'Normal', color: 'var(--color-success)', bg: 'rgba(16, 185, 129, 0.08)', border: 'rgba(16, 185, 129, 0.2)' };
        if (num < 160) return { status: 'Elevated', color: '#eab308', bg: 'rgba(234, 179, 8, 0.08)', border: 'rgba(234, 179, 8, 0.2)' };
        return { status: 'High', color: 'var(--color-danger)', bg: 'rgba(239, 68, 68, 0.08)', border: 'rgba(239, 68, 68, 0.2)' };
      }
      if (name === 'hdl') {
        if (num < 40) return { status: 'Low', color: 'var(--color-danger)', bg: 'rgba(239, 68, 68, 0.08)', border: 'rgba(239, 68, 68, 0.2)' };
        return { status: 'Normal', color: 'var(--color-success)', bg: 'rgba(16, 185, 129, 0.08)', border: 'rgba(16, 185, 129, 0.2)' };
      }
      if (name === 'triglycerides') {
        if (num < 150) return { status: 'Normal', color: 'var(--color-success)', bg: 'rgba(16, 185, 129, 0.08)', border: 'rgba(16, 185, 129, 0.2)' };
        if (num < 200) return { status: 'Elevated', color: '#eab308', bg: 'rgba(234, 179, 8, 0.08)', border: 'rgba(234, 179, 8, 0.2)' };
        return { status: 'High', color: 'var(--color-danger)', bg: 'rgba(239, 68, 68, 0.08)', border: 'rgba(239, 68, 68, 0.2)' };
      }
      if (name === 'hemoglobin') {
        if (num < 12.0) return { status: 'Low', color: 'var(--color-danger)', bg: 'rgba(239, 68, 68, 0.08)', border: 'rgba(239, 68, 68, 0.2)' };
        if (num <= 17.5) return { status: 'Normal', color: 'var(--color-success)', bg: 'rgba(16, 185, 129, 0.08)', border: 'rgba(16, 185, 129, 0.2)' };
        return { status: 'High', color: 'var(--color-danger)', bg: 'rgba(239, 68, 68, 0.08)', border: 'rgba(239, 68, 68, 0.2)' };
      }
      if (name === 'creatinine') {
        if (num < 0.6) return { status: 'Low', color: '#3b82f6', bg: 'rgba(59, 130, 246, 0.08)', border: 'rgba(59, 130, 246, 0.2)' };
        if (num <= 1.2) return { status: 'Normal', color: 'var(--color-success)', bg: 'rgba(16, 185, 129, 0.08)', border: 'rgba(16, 185, 129, 0.2)' };
        return { status: 'High', color: 'var(--color-danger)', bg: 'rgba(239, 68, 68, 0.08)', border: 'rgba(239, 68, 68, 0.2)' };
      }
      if (name === 'heartRate') {
        if (num < 60) return { status: 'Low', color: '#3b82f6', bg: 'rgba(59, 130, 246, 0.08)', border: 'rgba(59, 130, 246, 0.2)' };
        if (num <= 100) return { status: 'Normal', color: 'var(--color-success)', bg: 'rgba(16, 185, 129, 0.08)', border: 'rgba(16, 185, 129, 0.2)' };
        return { status: 'High', color: 'var(--color-danger)', bg: 'rgba(239, 68, 68, 0.08)', border: 'rgba(239, 68, 68, 0.2)' };
      }
      if (name === 'oxygen') {
        if (num < 95) return { status: 'Low', color: 'var(--color-danger)', bg: 'rgba(239, 68, 68, 0.08)', border: 'rgba(239, 68, 68, 0.2)' };
        return { status: 'Normal', color: 'var(--color-success)', bg: 'rgba(16, 185, 129, 0.08)', border: 'rgba(16, 185, 129, 0.2)' };
      }
      if (name === 'temperature') {
        if (num < 97.0) return { status: 'Low', color: '#3b82f6', bg: 'rgba(59, 130, 246, 0.08)', border: 'rgba(59, 130, 246, 0.2)' };
        if (num < 99.5) return { status: 'Normal', color: 'var(--color-success)', bg: 'rgba(16, 185, 129, 0.08)', border: 'rgba(16, 185, 129, 0.2)' };
        return { status: 'High', color: 'var(--color-danger)', bg: 'rgba(239, 68, 68, 0.08)', border: 'rgba(239, 68, 68, 0.2)' };
      }
      return null;
    }

    function BPParamItem({ sys, dia }) {
      if (!sys && !dia) return null;
      let status = 'Normal';
      let color = 'var(--color-success)';
      let bg = 'rgba(16, 185, 129, 0.08)';
      let border = 'rgba(16, 185, 129, 0.2)';

      const s = parseInt(sys);
      const d = parseInt(dia);

      if (s >= 130 || d >= 80) {
        status = 'High';
        color = 'var(--color-danger)';
        bg = 'rgba(239, 68, 68, 0.08)';
        border = 'rgba(239, 68, 68, 0.2)';
      } else if (s >= 120 && d < 80) {
        status = 'Elevated';
        color = '#eab308';
        bg = 'rgba(234, 179, 8, 0.08)';
        border = 'rgba(234, 179, 8, 0.2)';
      }

      return (
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '0.45rem 0.6rem', background: 'rgba(255, 255, 255, 0.015)', border: '1px solid rgba(255, 255, 255, 0.04)', borderRadius: '8px', marginBottom: '0.3rem' }}>
          <div style={{ textAlign: 'left' }}>
            <span style={{ fontSize: '0.7rem', color: '#e2e8f0', fontWeight: '500', display: 'block' }}>Blood Pressure</span>
            <span style={{ fontSize: '0.55rem', color: 'var(--text-secondary)' }}>Ref: &lt; 120/80 mmHg</span>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>

    function generateWhatsAppShareString(record) {
      if (!record) return "";
      let markdown = `*Health Record Summary*\n`;
      markdown += `*Date:* ${record.date || 'N/A'}\n\n`;
      
      if (record.diagnosis && record.diagnosis.length > 0) {
        markdown += `*Diagnosis:*\n`;
        record.diagnosis.forEach(item => {
          markdown += `- ${item}\n`;
        });
        markdown += `\n`;
      }
      
      if (record.advice && record.advice.length > 0) {
        markdown += `*Advice:*\n`;
        record.advice.forEach(item => {
          markdown += `- ${item}\n`;
        });
        markdown += `\n`;
      }
      
      if (record.medications && record.medications.length > 0) {
        markdown += `*Medications:*\n`;
        record.medications.forEach(med => {
          const details = [
            med.dosage ? `Dosage: ${med.dosage}` : '',
            med.frequency ? `Freq: ${med.frequency}` : '',
            med.route ? `Route: ${med.route}` : '',
            med.duration ? `Duration: ${med.duration}` : ''
          ].filter(Boolean).join(', ');
          markdown += `- *${med.name}*${details ? ` (${details})` : ''}\n`;
        });
        markdown += `\n`;
      }
      
      if (record.tests && record.tests.length > 0) {
        markdown += `*Prescribed Tests:*\n`;
        record.tests.forEach(item => {
          markdown += `- ${item}\n`;
        });
        markdown += `\n`;
      }
      
      if (record.vitals) {
        const v = record.vitals;
        const lines = [];
        if (v.bpSystolic && v.bpDiastolic) lines.push(`BP: ${v.bpSystolic}/${v.bpDiastolic} mmHg`);
        if (v.glucose) lines.push(`Glucose: ${v.glucose} mg/dL`);
        if (v.hba1c) lines.push(`HbA1c: ${v.hba1c}%`);
        if (v.tsh) lines.push(`TSH: ${v.tsh} uIU/mL`);
        if (v.cholesterol) lines.push(`Cholesterol: ${v.cholesterol} mg/dL`);
        if (v.ldl) lines.push(`LDL: ${v.ldl} mg/dL`);
        if (v.hdl) lines.push(`HDL: ${v.hdl} mg/dL`);
        if (v.triglycerides) lines.push(`Triglycerides: ${v.triglycerides} mg/dL`);
        if (v.creatinine) lines.push(`Creatinine: ${v.creatinine} mg/dL`);
        if (v.hemoglobin) lines.push(`Hemoglobin: ${v.hemoglobin} g/dL`);
        if (v.temperature) lines.push(`Temp: ${v.temperature}°F`);
        if (v.weight) lines.push(`Weight: ${v.weight} kg`);
        
        if (lines.length > 0) {
          markdown += `*Vitals & Metrics:*\n`;
          lines.forEach(line => {
            markdown += `- ${line}\n`;
          });
          markdown += `\n`;
        }
      }
      
      return markdown.trim();
    }

    const runOCR = async (apiKey, base64Image, language = 'English') => {
      const model = "gemini-2.5-flash";
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
      
      const ocrPrompt = `
You are a highly advanced Clinical Medical OCR parser. Extract parameters from the uploaded medical record image.
Perform parsing with strict accuracy. The text is in \${language}.
Output the results strictly as a JSON object matching this schema:
{
  "date": "YYYY-MM-DD",
  "notes": "Brief clinical context summary",
  "diagnosis": ["Diagnostic terms identified"],
  "advice": ["Clinical recommendations, follow-ups"],
  "medications": [
    { "name": "Drug name", "dosage": "e.g. 500mg", "frequency": "e.g. twice daily", "route": "e.g. oral", "duration": "e.g. 5 days" }
  ],
  "tests": ["Prescribed laboratory tests"],
  "vitals": {
    "bpSystolic": number or null,
    "bpDiastolic": number or null,
    "glucose": number or null,
    "hba1c": number or null,
    "tsh": number or null,
    "cholesterol": number or null,
    "ldl": number or null,
    "hdl": number or null,
    "triglycerides": number or null,
    "hemoglobin": number or null,
    "creatinine": number or null,
    "weight": number or null,
    "heartRate": number or null,
    "oxygen": number or null,
    "temperature": number or null
  }
}
`;

      const matches = base64Image.match(/^data:([a-zA-Z0-9]+\/[a-zA-Z0-9-.+]+);base64,(.+)$/);
      const mimeType = matches ? matches[1] : 'image/jpeg';
      const rawData = matches ? matches[2] : base64Image;

      const payload = {
        contents: [
          {
            parts: [
              { text: ocrPrompt },
              {
                inlineData: {
                  mimeType: mimeType,
                  data: rawData
                }
              }
            ]
          }
        ],
        generationConfig: {
          responseMimeType: "application/json",
          temperature: 0.0
        }
      };

      const response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      const data = await response.json();
      if (!response.ok) {
        throw new Error(data.error?.message || "Gemini OCR failed");
      }

      const textResult = data.candidates?.[0]?.content?.parts?.[0]?.text;
      return JSON.parse(textResult);
    };

        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 120;
            canvas.height = 120;
            const ctx = canvas.getContext('2d');
            const size = Math.min(img.width, img.height);
            const x = (img.width - size) / 2;
            const y = (img.height - size) / 2;
            ctx.drawImage(img, x, y, size, size, 0, 0, 120, 120);
            resolve(canvas.toDataURL('image/jpeg', 0.7));
          };
          img.onerror = (e) => reject(new Error("Failed to load image"));
          img.src = event.target.result;
        };
        reader.onerror = (e) => reject(new Error("Failed to read file"));
        reader.readAsDataURL(file);
      });

      const uploadBase64ToStorage = (base64String, path) => {
        return new Promise((resolve, reject) => {
          if (!window.firebase || !window.firebase.storage) {
            return reject(new Error("Firebase Storage not available"));
          }
          try {
            const storageRef = window.firebase.storage().ref(path);
            const parts = base64String.split(';base64,');
            const contentType = parts[0].split(':')[1];
            const raw = window.atob(parts[2] || parts[1]);
            const rawLength = raw.length;
            const uInt8Array = new Uint8Array(rawLength);
            for (let i = 0; i < rawLength; ++i) {
              uInt8Array[i] = raw.charCodeAt(i);
            }
            const blob = new Blob([uInt8Array], { type: contentType });
            const uploadTask = storageRef.put(blob);
            
            uploadTask.on('state_changed', 
              null, 
              (error) => reject(error), 
              () => {
                uploadTask.snapshot.ref.getDownloadURL().then((downloadURL) => {
                  resolve(downloadURL);
                }).catch(reject);
              }
            );
          } catch (e) {
            reject(e);
          }
        });
      };

      const logVitals = async (memberId, newVital, customDate) => {
        const targetId = memberId === 'household' ? 'owner' : memberId;
        
        // Clean placeholder values before saving
        const cleanedVital = {};
        const isPlaceholderVal = (val) => {
          return val === null || val === undefined || val === '' ||
                 val === -999 || val === '-999' ||
                 val === -99 || val === '-99' ||
                 val === 404 || val === '404';
        };
        Object.keys(newVital).forEach(k => {
          const val = newVital[k];
          if (isPlaceholderVal(val)) {
            cleanedVital[k] = null;
          } else {
            cleanedVital[k] = val;
          }
        });

        let dateStr = customDate;
        if (!dateStr) {
          dateStr = new Date().toLocaleDateString('en-US', { month: '2-digit', day: '2-digit' });
        } else if (dateStr.includes('-')) {
          const parts = dateStr.split('-');
          dateStr = `${parts[1]}/${parts[2]}`;
        }

        if (dbSource === 'firebase' && currentUser) {
          try {
            const db = window.firebase.firestore();
            const querySnapshot = await db.collection('wearableVitals')
              .where('userId', '==', currentUser.uid)
              .where('memberId', '==', targetId)
              .where('date', '==', dateStr)
              .get();
            
            if (!querySnapshot.empty) {
              const docId = querySnapshot.docs[0].id;
              const mergedVal = {};
              Object.keys(cleanedVital).forEach(k => {
                if (cleanedVital[k] !== null && cleanedVital[k] !== undefined && cleanedVital[k] !== '') {
                  mergedVal[k] = cleanedVital[k];
                }
              });
              await db.collection('wearableVitals').doc(docId).update(mergedVal);
            } else {
              await db.collection('wearableVitals').add({
                userId: currentUser.uid,
                memberId: targetId,
                date: dateStr,
                ...cleanedVital
              });
            }
            await writeAuditLog('WRITE_VITALS', currentUser.uid);
          } catch (e) {
            console.error("Failed to write vitals in Firestore:", e);
            addToast("Failed to sync vitals to cloud: " + e.message, "danger");
            return;
          }
        } else {
          setVitals(prev => {
            const logs = prev[targetId] || [];
            let merged = false;
            let updatedLogs = logs.map(log => {
              if (log.date === dateStr) {
                merged = true;
                const mergedLog = { ...log };
                Object.keys(cleanedVital).forEach(k => {
                  if (cleanedVital[k] !== null && cleanedVital[k] !== undefined && cleanedVital[k] !== '') {
                    mergedLog[k] = cleanedVital[k];
                  }
                });
                return mergedLog;
              }
              return log;
            });
            if (!merged) {
              updatedLogs.push({ date: dateStr, ...cleanedVital });
            }
            updatedLogs.sort((a, b) => {
              const parseDate = (dStr) => {
                const parts = dStr.split('/');
                return new Date(2026, parseInt(parts[0]) - 1, parseInt(parts[1])).getTime();
              };
              return parseDate(a.date) - parseDate(b.date);
            });
            return { ...prev, [targetId]: updatedLogs.slice(-15) };
          });
        }
        addToast(`Successfully logged vitals parameters.`, 'success');
      };

              try {
                await db.collection('healthRecords').doc(d.id).delete();
                await writeAuditLog('DELETE_HEALTH_RECORD', currentUser.uid);
              } catch (e) {
                console.error("Firestore delete record error:", e);
              }
            }
          } else if (updatedList.length > uploadedRecords.length) {
            const added = updatedList.filter(x => !uploadedRecords.some(y => y.id === x.id));
            for (const a of added) {
              try {
                let finalFileUrl = '';
                if (a.fileData && a.fileData.startsWith('data:')) {
                  try {
                    finalFileUrl = await uploadBase64ToStorage(a.fileData, `users/${currentUser.uid}/records/${a.name || 'document'}_${Date.now()}`);
                  } catch (err) {
                    console.error("Storage upload failed, saving locally in firestore doc:", err);
                    finalFileUrl = a.fileData;
                  }
                }
                
                await db.collection('healthRecords').add({
                  userId: currentUser.uid,
                  memberId: a.memberId,
                  name: a.name,
                  date: a.date,
                  doctor: a.doctor || 'AI Auto-Scanner',
                  type: a.type || 'Lab Report',
                  notes: a.notes || '',
                  diagnosis: a.diagnosis || [],
                  advice: a.advice || [],
                  medications: a.medications || [],
                  tests: a.tests || [],
                  vitals: a.vitals || {},
                  verificationStatus: a.verificationStatus || 'verified',
                  ocrConfidence: a.ocrConfidence || 1.0,
                  fileUrl: finalFileUrl
                });
                await writeAuditLog('WRITE_HEALTH_RECORD', currentUser.uid);
              } catch (e) {
                console.error("Firestore add record error:", e);
              }
            }
          }
        } else {
          if (typeof value === 'function') {
            setUploadedRecords(value);
          } else {
            setUploadedRecords(value);
          }
        }
      };

      const handleLogout = async () => {
        if (window.firebase && window.firebase.apps.length) {
          try {
            await window.firebase.auth().signOut();
          } catch (e) {
            console.error("Firebase signOut error:", e);
          }
        }
        localStorage.removeItem('fh_is_logged_in');
        setIsLoggedIn(false);
        addToast("Logged out successfully.", "info");
      };

      const saveFirebaseConfig = (config) => {
        localStorage.setItem('fh_firebase_config', JSON.stringify(config));
        setFirebaseConfig(config);
        if (config.apiKey && config.projectId) {
          const success = reinitFirebase(config);
          if (success) {
            setDbSource('firebase');
            addToast("Firebase configuration saved and connected!", "success");
          }
        } else {
          if (window.firebase && window.firebase.apps.length) {
            window.firebase.apps.forEach(app => app.delete());
          }
          setDbSource('local');
          setCurrentUser(null);
          addToast("Firebase disconnected. Switched to Local Mode.", "info");
        }
      };

      const activeMemberIdForData = activeMemberId === 'household' ? 'owner' : activeMemberId;

      return (
        <HealthContext.Provider value={{
          members, activeMemberId, setActiveMemberId, activeMember,
          activeTab, setActiveTab,
          vitals: vitals[activeMemberIdForData] || [], allVitals: vitals,
          vaccinations: vaccinations.filter(v => v.memberId === activeMemberIdForData), allVaccinations: vaccinations,
          medicines: medicines[activeMemberIdForData] || [], allMedicines: medicines,
          appointments: appointments.filter(a => a.memberId === activeMemberIdForData), allAppointments: appointments,
          geminiKey, setGeminiKey, recentOrders, addFamilyMember, updateMemberAvatar, updateFamilyMember, logVitals, updateVaccinationStatus, addMedicine, logMedicineDose, orderMedicines, bookAppointment,
          uploadedRecords, setUploadedRecords: setUploadedRecordsWrapper, pregnancyChecklist, setPregnancyChecklist, babyMilestones, setBabyMilestones,
          wearableSensors, setWearableSensors, toasts, addToast, removeToast, resetDatabase,
          sampleCollections, bookSampleCollection, updateCollectionStatus, cancelCollection, markCollectionSynced,
          medicalHistories, addMedicalHistory,
          isLoggedIn, setIsLoggedIn, currentUser, dbSource, handleLogout, firebaseConfig, saveFirebaseConfig
        }}>
          {children}
        </HealthContext.Provider>
      );
    };

            if (isRegistering) {
              const userCredential = await window.firebase.auth().createUserWithEmailAndPassword(email, password);
              const user = userCredential.user;
              // Save user profile info in Firestore
              await window.firebase.firestore().collection('users').doc(user.uid).set({
                uid: user.uid,
                email: user.email,
                displayName: name || user.email.split('@')[0],
                role: 'owner',
                createdAt: window.firebase.firestore.FieldValue.serverTimestamp()
              });
              // Create default owner profile in familyMembers
              await window.firebase.firestore().collection('familyMembers').add({
                userId: user.uid,
                name: name || user.email.split('@')[0],
                relation: 'Owner',
                dob: '1990-01-01',
                bloodGroup: 'O+',
                allergies: [],
                conditions: [],
                avatarUrl: '',
                themeColor: 'teal'
              });
            } else {
              await window.firebase.auth().signInWithEmailAndPassword(email, password);
            }
            onLoginSuccess();
          } else {
            // Local fallback
            if (email === 'demo@health.com' && password === '123456') {
              onLoginSuccess();
            } else {
              throw new Error("Local demo credentials: demo@health.com / 123456. Or configure Firebase credentials.");

          }
        } catch (err) {
          console.error("Auth error:", err);
          setError(err.message);
        } finally {
          setLoading(false);
        }
      };

      const handleGoogleAuth = async () => {
        setError('');
        setLoading(true);
        try {
          if (window.firebase && window.firebase.apps && window.firebase.apps.length > 0) {
            const provider = new window.firebase.auth.GoogleAuthProvider();
            const result = await window.firebase.auth().signInWithPopup(provider);
            const user = result.user;
            
            // Check if user document already exists
            const userDoc = await window.firebase.firestore().collection('users').doc(user.uid).get();
            if (!userDoc.exists) {
              await window.firebase.firestore().collection('users').doc(user.uid).set({
                uid: user.uid,
                email: user.email || '',
                displayName: user.displayName || 'User',
                role: 'owner',

                name: user.displayName || 'Owner',
                relation: 'Owner',
                dob: '1990-01-01',
                bloodGroup: 'O+',
                allergies: [],
                conditions: [],
                avatarUrl: user.photoURL || '',
                themeColor: 'teal'

          setError(err.message);

    // Pregnancy Fetal Kick Counter
    function KickCounter() {
      const [kicks, setKicks] = useState([]);
      const [sessionActive, setSessionActive] = useState(false);
      const [startTime, setStartTime] = useState(null);

      const recordKick = () => {
        if (!sessionActive) {
          setSessionActive(true);
          setStartTime(Date.now());
        }
        setKicks(prev => [...prev, Date.now()]);
      };

      const resetKicks = () => {
        setKicks([]);
        setSessionActive(false);
        setStartTime(null);
      };

      return (
        <div style={{ marginTop: '0.75rem', padding: '0.75rem', border: '1px dashed rgba(10, 158, 124, 0.3)', borderRadius: '8px', background: 'var(--bg-secondary)' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', fontSize: '0.75rem' }}>
            <span style={{ fontWeight: 'bold' }}>👣 Kick Counter</span>
            {kicks.length > 0 && (
              <span style={{ color: 'var(--color-primary)', fontWeight: 'bold' }}>
                {Math.round(kicks.length / (Math.max(1, Date.now() - startTime) / 1000 / 3600))} kicks/hr
              </span>

    // WHO Pediatric Growth Percentile Simulator Chart
    function PediatricGrowthChart() {
      const [ageMonths, setAgeMonths] = useState(2);
      const [weightKg, setWeightKg] = useState(5.5);

      const dataPoints = {
        0: [2.8, 3.2, 3.7],
        1: [3.6, 4.0, 4.5],
        2: [4.3, 4.7, 5.4],
        3: [5.0, 5.6, 6.3],
        4: [5.6, 6.2, 7.0],
        5: [6.1, 6.8, 7.6],
        6: [6.5, 7.3, 8.2]
      };

      const w = 320, h = 140, pad = 20;

      const getCoords = (m, wt) => {
        const x = pad + (m / 6) * (w - pad * 2);
        const y = h - pad - ((wt - 2) / 7) * (h - pad * 2);
        return { x, y };
      };

      const p15 = Object.keys(dataPoints).map(m => { const pt = getCoords(m, dataPoints[m][0]); return `${pt.x},${pt.y}`; }).join(' ');
      const p50 = Object.keys(dataPoints).map(m => { const pt = getCoords(m, dataPoints[m][1]); return `${pt.x},${pt.y}`; }).join(' ');
      const p85 = Object.keys(dataPoints).map(m => { const pt = getCoords(m, dataPoints[m][2]); return `${pt.x},${pt.y}`; }).join(' ');

      const activeCoords = getCoords(ageMonths, weightKg);
      const interpretation = weightKg < dataPoints[ageMonths][0] ? 'Under 15th %' :
                             weightKg > dataPoints[ageMonths][2] ? 'Above 85th %' :
                             'Median (50th %) Curve';

      return (
        <div style={{ marginTop: '1rem', borderTop: '1px solid var(--border-color)', paddingTop: '1rem' }}>
          <strong style={{ fontSize: '0.85rem', display: 'block', marginBottom: '0.5rem' }}>📈 Weight-for-Age Growth Curves</strong>
          
          <div style={{ background: 'var(--bg-primary)', padding: '0.75rem', borderRadius: '14px', border: '1px solid var(--border-color)' }}>
            <svg viewBox={`0 0 ${w} ${h}`} width="100%" height="100%" style={{ marginBottom: '0.5rem' }}>
              <line x1={pad} y1={pad} x2={w-pad} y2={pad} stroke="var(--border-color)" strokeDasharray="2 2" />
              <line x1={pad} y1={h-pad} x2={w-pad} y2={h-pad} stroke="var(--border-color)" />
              
              <polyline points={p15} fill="none" stroke="var(--color-warning)" strokeWidth="1.5" strokeDasharray="3 3" />
              <polyline points={p50} fill="none" stroke="var(--color-success)" strokeWidth="2.5" />
              <polyline points={p85} fill="none" stroke="var(--color-info)" strokeWidth="1.5" strokeDasharray="3 3" />
              
              <circle cx={activeCoords.x} cy={activeCoords.y} r="6" fill="var(--color-danger)" stroke="var(--bg-secondary)" strokeWidth="2" />
              <text x={w-pad-25} y={getCoords(6, dataPoints[6][2]).y - 3} fontSize="6" fill="var(--color-info)">85th</text>
              <text x={w-pad-25} y={getCoords(6, dataPoints[6][1]).y - 3} fontSize="6" fill="var(--color-success)">50th</text>
              <text x={w-pad-25} y={getCoords(6, dataPoints[6][0]).y - 3} fontSize="6" fill="var(--color-warning)">15th</text>
            </svg>
            
            <div style={{ display: 'flex', gap: '0.5rem', marginBottom: '0.5rem' }}>
              <div style={{ flex: 1 }}>
                <span style={{ fontSize: '0.65rem', display: 'block', color: 'var(--text-secondary)' }}>Age: {ageMonths}m</span>
                <input type="range" min="0" max="6" value={ageMonths} onChange={e => setAgeMonths(parseInt(e.target.value))} style={{ width: '100%', accentColor: 'var(--color-success)' }} />
              </div>
              <div style={{ flex: 1 }}>
                <span style={{ fontSize: '0.65rem', display: 'block', color: 'var(--text-secondary)' }}>Weight: {weightKg}kg</span>
                <input type="range" min="3" max="8.5" step="0.1" value={weightKg} onChange={e => setWeightKg(parseFloat(e.target.value))} style={{ width: '100%', accentColor: 'var(--color-success)' }} />
              </div>
            </div>
            <div style={{ background: 'var(--bg-secondary)', padding: '0.5rem', borderRadius: '6px', fontSize: '0.72rem', fontWeight: 'bold', textAlign: 'center' }}>
              Curve: <span style={{ color: 'var(--color-primary)' }}>{interpretation}</span>
            </div>
          </div>
        </div>
      );
    }

      if (!dateStr) return { day: '28', month: 'MAY' };
      const d = new Date(dateStr);
      if (isNaN(d.getTime())) return { day: dateStr.split('-')[2] || '28', month: 'MAY' };
      const day = d.getDate().toString();
      const month = d.toLocaleString('en-US', { month: 'short' }).toUpperCase();
      return { day, month };

    function ProfileSelectionPrompt({ title }) {

        <div className="fade-in" style={{ padding: '1rem', textAlign: 'center' }}>

            👥
